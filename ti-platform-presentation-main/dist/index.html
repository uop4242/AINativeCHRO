primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">From Engine to Outcomes</p>\n        <h2 class=\"slide-title-text\">Skills Gap Analysis: From Individual to Organization</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Not a qualitative guess: normalized skills + modeled proficiency turn gaps into quantified, actionable deltas—per person and at org scale.</p>\n    </div>\n    <div class=\"gap-full-grid\">\n        <!-- Top: Individual Gap Analysis -->\n        <div class=\"individual-gap\">\n            <div class=\"gap-comparison\">\n                <!-- Job Profile -->\n                <div class=\"gap-profile job-profile\">\n                    <div class=\"gap-profile-header\">\n                        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"#3B94DC\"><path d=\"M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z\"/></svg>\n                        <div>\n                            <h4>Job Profile</h4>\n                            <span>Senior Data Scientist</span>\n                        </div>\n                    </div>\n                    <div class=\"gap-skills-list\">\n                        <div class=\"gap-skill-row\">\n                            <span class=\"skill-name\">Machine Learning</span>\n                            <span class=\"level-badge level-4\">Level 4</span>\n                        </div>\n                        <div class=\"gap-skill-row\">\n                            <span class=\"skill-name\">Statistical Modeling</span>\n                            <span class=\"level-badge level-4\">Level 4</span>\n                        </div>\n                        <div class=\"gap-skill-row\">\n                            <span class=\"skill-name\">MLOps</span>\n                            <span class=\"level-badge level-3\">Level 3</span>\n                        </div>\n                        <div class=\"gap-skill-row\">\n                            <span class=\"skill-name\">Cloud Architecture</span>\n                            <span class=\"level-badge level-3\">Level 3</span>\n                        </div>\n                    </div>\n                </div>\n\n                <!-- Gap Lines -->\n                <div class=\"gap-connectors\">\n                    <div class=\"gap-line gap-met\">\n                        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#22C55E\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg>\n                    </div>\n                    <div class=\"gap-line gap-close\">\n                        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#EAB308\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"/></svg>\n                        <span class=\"gap-delta\">-1</span>\n                    </div>\n                    <div class=\"gap-line gap-significant\">\n                        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#EF4444\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z\"/></svg>\n                        <span class=\"gap-delta\">-2</span>\n                    </div>\n                    <div class=\"gap-line gap-moderate\">\n                        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#F97316\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z\"/></svg>\n                        <span class=\"gap-delta\">-1</span>\n                    </div>\n                </div>\n\n                <!-- Employee Profile -->\n                <div class=\"gap-profile employee-profile\">\n                    <div class=\"gap-profile-header\">\n                        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"#00B6A1\"><path d=\"M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\"/></svg>\n                        <div>\n                            <h4>Employee Profile</h4>\n                            <span>Jane Chen, Data Scientist</span>\n                        </div>\n                    </div>\n                    <div class=\"gap-skills-list\">\n                        <div class=\"gap-skill-row met\">\n                            <span class=\"skill-name\">Machine Learning</span>\n                            <span class=\"level-badge level-4\">Level 4</span>\n                        </div>\n                        <div class=\"gap-skill-row close\">\n                            <span class=\"skill-name\">Statistical Modeling</span>\n                            <span class=\"level-badge level-3\">Level 3</span>\n                        </div>\n                        <div class=\"gap-skill-row significant\">\n                            <span class=\"skill-name\">MLOps</span>\n                            <span class=\"level-badge level-1\">Level 1</span>\n                        </div>\n                        <div class=\"gap-skill-row moderate\">\n                            <span class=\"skill-name\">Cloud Architecture</span>\n                            <span class=\"level-badge level-2\">Level 2</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Bottom: Organizational Density -->\n        <div class=\"org-density\">\n            <div class=\"org-density-header\">\n                <h3>Data Science Team &mdash; Skill Coverage</h3>\n            </div>\n            <div class=\"org-density-bars\">\n                <div class=\"org-bar-row\">\n                    <div class=\"org-bar-label\">\n                        <span class=\"skill-name\">Machine Learning</span>\n                        <span class=\"bar-stats\"></span>\n                    </div>\n                    <div class=\"org-bar-track\">\n                        <div class=\"org-bar-fill density-fill high\" style=\"width: 94%\"></div>\n                    </div>\n                </div>\n                <div class=\"org-bar-row\">\n                    <div class=\"org-bar-label\">\n                        <span class=\"skill-name\">Statistical Modeling</span>\n                        <span class=\"bar-stats\"></span>\n                    </div>\n                    <div class=\"org-bar-track\">\n                        <div class=\"org-bar-fill density-fill\" style=\"width: 78%; background: linear-gradient(90deg, #22C55E, #EAB308);\"></div>\n                    </div>\n                </div>\n                <div class=\"org-bar-row\">\n                    <div class=\"org-bar-label\">\n                        <span class=\"skill-name\">MLOps</span>\n                        <span class=\"bar-stats\"></span>\n                    </div>\n                    <div class=\"org-bar-track\">\n                        <div class=\"org-bar-fill density-fill low\" style=\"width: 16%\"></div>\n                    </div>\n                </div>\n                <div class=\"org-bar-row\">\n                    <div class=\"org-bar-label\">\n                        <span class=\"skill-name\">Cloud Architecture</span>\n                        <span class=\"bar-stats\"></span>\n                    </div>\n                    <div class=\"org-bar-track\">\n                        <div class=\"org-bar-fill density-fill medium\" style=\"width: 42%\"></div>\n                    </div>\n                </div>\n            </div>\n            <div class=\"gap-callout\">\n                <svg viewBox=\"0 0 24 24\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z\"/></svg>\n                <div class=\"gap-callout-content\">\n                    <h5>Critical Gap: MLOps</h5>\n                    <p>Low coverage with limited proficiency depth. 12 team members have adjacent skills (Docker, CI/CD, Kubernetes) suitable for upskilling.</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"7\">\n        <h4>Speaker Notes</h4>\n        This is where everything comes together. Take Jane Chen &mdash; she wants to move into a Senior Data Scientist role. We compare her actual proficiency scores against the job profile requirements. Green: she meets the bar. Red: significant gap. She's strong in ML but needs MLOps and cloud skills. Now zoom out to the team level &mdash; machine learning coverage is strong across the team, but MLOps has low coverage with limited proficiency depth. And critically, we can identify the 12 team members who have the adjacent skills that make them ideal candidates for upskilling. That's the bridge to action.\n    </div>\n</div>\n", "slides/17-search-intelligence.html": "<!-- Slide 9a: The Search Intelligence Layer (HybridSearch) -->\n<div class=\"slide slide-content\" data-slide=\"9\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">09</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">From Engine to Outcomes</p>\n        <h2 class=\"slide-title-text\">The Search Intelligence Layer</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Multi-signal retrieval with weighted rank fusion so every match is grounded, explainable, and actionable.</p>\n    </div>\n    <div class=\"hs-intel-layout\">\n        <div class=\"hs-intel-left\">\n            <!-- Four search vectors -->\n            <div class=\"hs-vector-card\">\n                <div class=\"hs-vector-icon\" style=\"background: rgba(0, 182, 161, 0.1);\">\n                    <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#0A7571\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z\"/></svg>\n                </div>\n                <div class=\"hs-vector-info\">\n                    <h3>Precise Matching</h3>\n                    <p>Structured field-level correlation that catches exact and near-exact alignments across canonicalized skills, proficiency scores, and resolved role archetypes.</p>\n                    <div class=\"hs-vector-catches\" style=\"color: var(--primary-dark); background: rgba(0, 182, 161, 0.06);\">Catches &rarr; exact titles, canonical skills, credentials</div>\n                </div>\n            </div>\n            <div class=\"hs-vector-card\">\n                <div class=\"hs-vector-icon\" style=\"background: rgba(59, 148, 220, 0.1);\">\n                    <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#3B94DC\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n                </div>\n                <div class=\"hs-vector-info\">\n                    <h3>Relevance Scoring</h3>\n                    <p>Statistical term-frequency analysis across enriched Golden Records. Finds strong keyword signals even when profile structure varies.</p>\n                    <div class=\"hs-vector-catches\" style=\"color: var(--blue); background: rgba(59, 148, 220, 0.06);\">Catches &rarr; keyword-rich profiles, domain terminology</div>\n                </div>\n            </div>\n            <div class=\"hs-vector-card\">\n                <div class=\"hs-vector-icon\" style=\"background: rgba(255, 150, 48, 0.1);\">\n                    <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#FF9630\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z\"/></svg>\n                </div>\n                <div class=\"hs-vector-info\">\n                    <h3>Neural Embeddings</h3>\n                    <p>Dense vector representations that capture conceptual similarity. Understands that roles and skills can be equivalent without sharing a single word.</p>\n                    <div class=\"hs-vector-catches\" style=\"color: #B86E1B; background: rgba(255, 150, 48, 0.06);\">Catches &rarr; equivalent roles, adjacent skills, latent meaning</div>\n                </div>\n            </div>\n            <div class=\"hs-vector-card\">\n                <div class=\"hs-vector-icon\" style=\"background: rgba(104, 97, 226, 0.1);\">\n                    <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#6861E2\"><path d=\"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z\"/></svg>\n                </div>\n                <div class=\"hs-vector-info\">\n                    <h3>Learned Sparse Expansion</h3>\n                    <p>ML-derived token expansion that broadens recall by inferring terms a candidate <em>would</em> use &mdash; even if they don't appear in their profile.</p>\n                    <div class=\"hs-vector-catches\" style=\"color: #4A44A8; background: rgba(104, 97, 226, 0.06);\">Catches &rarr; implicit skills, inferred experience, semantic gaps</div>\n                </div>\n            </div>\n        </div>\n        <div class=\"hs-intel-right\">\n            <!-- Fusion diagram -->\n            <div class=\"hs-fusion-card\">\n                <h4>How They Combine</h4>\n                <div class=\"hs-fusion-flow\">\n                    <div class=\"hs-fusion-inputs\">\n                        <div class=\"hs-fusion-input\" style=\"background: rgba(0, 182, 161, 0.1); color: var(--primary-dark);\">Precise</div>\n                        <div class=\"hs-fusion-input\" style=\"background: rgba(59, 148, 220, 0.1); color: var(--blue);\">Relevance</div>\n                        <div class=\"hs-fusion-input\" style=\"background: rgba(255, 150, 48, 0.1); color: #B86E1B;\">Neural</div>\n                        <div class=\"hs-fusion-input\" style=\"background: rgba(104, 97, 226, 0.1); color: #4A44A8;\">Expansion</div>\n                    </div>\n                    <div class=\"hs-fusion-arrow\">\n                        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"var(--gray-mid)\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z\"/></svg>\n                    </div>\n                    <div class=\"hs-fusion-engine\">\n                        <div class=\"hs-fusion-engine-title\">Weighted Rank Fusion</div>\n                        <div class=\"hs-fusion-engine-sub\">Each vector weighted by signal strength per query context</div>\n                    </div>\n                    <div class=\"hs-fusion-arrow\">\n                        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z\"/></svg>\n                    </div>\n                    <div class=\"hs-fusion-output\">One unified ranking &mdash; <strong>precision + discovery</strong></div>\n                </div>\n            </div>\n            <!-- Why this matters -->\n            <div class=\"hs-why-card\">\n                <h5>Why This Matters</h5>\n                <div class=\"hs-why-list\">\n                    <div class=\"hs-why-item\">\n                        <div class=\"hs-why-bullet\" style=\"background: var(--primary);\"></div>\n                        <div>No single search method captures every type of match. Exact matching misses equivalent roles. Semantic search misses precise credentials. We use all of them.</div>\n                    </div>\n                    <div class=\"hs-why-item\">\n                        <div class=\"hs-why-bullet\" style=\"background: var(--blue);\"></div>\n                        <div>The fusion is weighted &mdash; not equal blending. The system dynamically adjusts which signals matter most depending on the nature of each query.</div>\n                    </div>\n                    <div class=\"hs-why-item\">\n                        <div class=\"hs-why-bullet\" style=\"background: var(--purple);\"></div>\n                        <div>Vectors don't search raw text &mdash; they search through canonicalized skills, resolved role archetypes, proficiency scores, and career trajectories. That's our enriched intelligence layer.</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"9\">\n        <h4>Speaker Notes</h4>\n        Now let's talk about what happens when you actually search across this enriched data. We don't use one search algorithm &mdash; we use four fundamentally different approaches, each designed to catch a different type of match. Precise matching catches exact alignments across our canonical skills and role archetypes. Relevance scoring finds strong keyword signals across our Golden Records. Neural embeddings understand conceptual similarity &mdash; that an SRE and a DevOps Engineer are the same thing even though they share no words. And learned sparse expansion infers terms a candidate would use, even if they haven't listed them. These four signals are fused using a weighted rank fusion engine &mdash; not a simple average, but a context-sensitive weighting. And critically, these vectors aren't searching raw text. They're searching through the enriched data layers we've been building &mdash; the skills taxonomy, the role archetypes, proficiency scores, career trajectories. That combination of multiple search methods with our proprietary data enrichment is what makes this defensible.\n    </div>\n</div>\n", "slides/18-signal-composition.html": "<!-- Slide 9b: Signal Composition in Action -->\n<div class=\"slide slide-content\" data-slide=\"9\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">09</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">From Engine to Outcomes</p>\n        <h2 class=\"slide-title-text\">Signal Composition in Action</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">By fusing precise, relevance, neural, and expansion signals over connected skills data, we scale discovery without losing specificity.</p>\n    </div>\n    <div class=\"hs-signal-layout\">\n        <div class=\"hs-signal-left\">\n            <!-- Live Example -->\n            <div class=\"hs-scenario-card\">\n                <h4>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n                    Live Example\n                </h4>\n                <div class=\"hs-query-bar\">\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--gray-mid)\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5z\"/></svg>\n                    \"Machine Learning Engineer\"\n                </div>\n                <div class=\"hs-signal-layers\">\n                    <div class=\"hs-signal-layer\" style=\"background: rgba(0, 182, 161, 0.06);\">\n                        <div class=\"hs-signal-icon\" style=\"background: var(--primary);\">P</div>\n                        <div class=\"hs-signal-text\">Precise match finds exact ML Engineers</div>\n                        <div class=\"hs-signal-count\">&rarr; 340 results</div>\n                    </div>\n                    <div class=\"hs-signal-layer\" style=\"background: rgba(59, 148, 220, 0.06);\">\n                        <div class=\"hs-signal-icon\" style=\"background: var(--blue);\">R</div>\n                        <div class=\"hs-signal-text\">Relevance adds profiles rich in ML terminology</div>\n                        <div class=\"hs-signal-count\">&rarr; +1,200</div>\n                    </div>\n                    <div class=\"hs-signal-layer\" style=\"background: rgba(255, 150, 48, 0.06);\">\n                        <div class=\"hs-signal-icon\" style=\"background: var(--orange);\">N</div>\n                        <div class=\"hs-signal-text\">Neural embeddings surface Applied Scientists, AI Researchers</div>\n                        <div class=\"hs-signal-count\">&rarr; +2,800</div>\n                    </div>\n                    <div class=\"hs-signal-layer\" style=\"background: rgba(104, 97, 226, 0.06);\">\n                        <div class=\"hs-signal-icon\" style=\"background: var(--purple);\">E</div>\n                        <div class=\"hs-signal-text\">Expansion infers Data Scientists with deployment experience</div>\n                        <div class=\"hs-signal-count\">&rarr; +4,100</div>\n                    </div>\n                </div>\n            </div>\n            <!-- Compounding effect callout -->\n            <div class=\"hs-compound-callout\">\n                <h5>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary-dark)\"><path d=\"M7 2v11h3v9l7-12h-4l4-8z\"/></svg>\n                    The Compounding Effect\n                </h5>\n                <p>Each search method alone captures a fraction of the talent landscape. Combined &mdash; and weighted by our data science models &mdash; they surface candidates that no single approach could find, ranked by composite relevance.</p>\n            </div>\n        </div>\n        <div class=\"hs-signal-right\">\n            <!-- Fused ranking results -->\n            <div class=\"hs-results-card\">\n                <h4>Fused Ranking &mdash; Top Results</h4>\n                <div class=\"hs-results-list\">\n                    <div class=\"hs-result-row\">\n                        <div class=\"hs-result-rank\" style=\"color: var(--primary);\">#1</div>\n                        <div class=\"hs-result-info\">\n                            <div class=\"hs-result-name\">ML Engineer, OpenAI</div>\n                            <div class=\"hs-result-why\">Exact title + strong canonical skill signals + neural match</div>\n                        </div>\n                        <div class=\"hs-result-dots\">\n                            <div class=\"hs-dot\" style=\"background: var(--primary);\"></div>\n                            <div class=\"hs-dot\" style=\"background: var(--blue);\"></div>\n                            <div class=\"hs-dot\" style=\"background: var(--orange);\"></div>\n                        </div>\n                    </div>\n                    <div class=\"hs-result-row\">\n                        <div class=\"hs-result-rank\" style=\"color: var(--primary);\">#2</div>\n                        <div class=\"hs-result-info\">\n                            <div class=\"hs-result-name\">Applied Scientist, Amazon</div>\n                            <div class=\"hs-result-why\">Different title, same archetype + deep ML skill overlap</div>\n                        </div>\n                        <div class=\"hs-result-dots\">\n                            <div class=\"hs-dot\" style=\"background: var(--blue);\"></div>\n                            <div class=\"hs-dot\" style=\"background: var(--orange);\"></div>\n                            <div class=\"hs-dot\" style=\"background: var(--purple);\"></div>\n                        </div>\n                    </div>\n                    <div class=\"hs-result-row\">\n                        <div class=\"hs-result-rank\" style=\"color: var(--blue);\">#3</div>\n                        <div class=\"hs-result-info\">\n                            <div class=\"hs-result-name\">Data Scientist, Stripe</div>\n                            <div class=\"hs-result-why\">ML deployment experience inferred + career trajectory aligned</div>\n                        </div>\n                        <div class=\"hs-result-dots\">\n                            <div class=\"hs-dot\" style=\"background: var(--orange);\"></div>\n                            <div class=\"hs-dot\" style=\"background: var(--purple);\"></div>\n                        </div>\n                    </div>\n                    <div class=\"hs-result-row\">\n                        <div class=\"hs-result-rank\" style=\"color: var(--blue);\">#4</div>\n                        <div class=\"hs-result-info\">\n                            <div class=\"hs-result-name\">Research Engineer, DeepMind</div>\n                            <div class=\"hs-result-why\">Neural similarity + skill proximity to ML Engineering duties</div>\n                        </div>\n                        <div class=\"hs-result-dots\">\n                            <div class=\"hs-dot\" style=\"background: var(--orange);\"></div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n            <!-- Legend -->\n            <div class=\"hs-legend\">\n                <div class=\"hs-legend-item\"><div class=\"hs-dot\" style=\"background: var(--primary);\"></div>Precise</div>\n                <div class=\"hs-legend-item\"><div class=\"hs-dot\" style=\"background: var(--blue);\"></div>Relevance</div>\n                <div class=\"hs-legend-item\"><div class=\"hs-dot\" style=\"background: var(--orange);\"></div>Neural</div>\n                <div class=\"hs-legend-item\"><div class=\"hs-dot\" style=\"background: var(--purple);\"></div>Expansion</div>\n            </div>\n            <!-- Proprietary advantage callout -->\n            <div class=\"hs-proprietary-callout\">\n                <h5>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--dark-blue)\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"/></svg>\n                    Proprietary Advantage\n                </h5>\n                <p>The vectors search through our enriched intelligence &mdash; canonicalized skills, resolved archetypes, proficiency scores, career context. The combination of multiple search methods with our proprietary data enrichment is what competitors cannot replicate.</p>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"9\">\n        <h4>Speaker Notes</h4>\n        Let me make this concrete. When someone searches for \"Machine Learning Engineer,\" here's what happens across our four search vectors. Precise matching finds 340 exact ML Engineers. Relevance scoring adds another 1,200 profiles rich in ML terminology. Neural embeddings recognize that Applied Scientists and AI Researchers are conceptually the same &mdash; adding 2,800 more. And our expansion layer infers that certain Data Scientists with deployment experience are functionally equivalent &mdash; adding 4,100 more. That's a talent pool that went from 340 to over 8,000. But the real power is in the fusion. These aren't just unioned together &mdash; they're ranked by a weighted fusion model that considers which signals are most meaningful for each query. And these vectors are searching through our enriched data &mdash; canonicalized skills from the taxonomy, resolved role archetypes, proficiency scores from our mathematical model, career context from our transition graph. That's why this is proprietary and defensible. You'd need our data layers AND our search architecture to replicate this.\n    </div>\n</div>\n", "slides/19-intelligence-outcomes.html": "<!-- Slide 9c: What This Intelligence Enables -->\n<div class=\"slide slide-content\" data-slide=\"9\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">09</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">From Engine to Outcomes</p>\n        <h2 class=\"slide-title-text\">What This Intelligence Enables</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Because Censia AI normalizes skills, titles, proficiency, and relationships into one intelligence layer, these outcomes become reusable agent capabilities—not bespoke analyses.</p>\n    </div>\n    <div class=\"hs-outcomes-layout\">\n        <div class=\"hs-outcomes-col\">\n            <div class=\"hs-outcome-card\">\n                <div class=\"hs-outcome-header\">\n                    <div class=\"hs-outcome-icon\" style=\"background: var(--light-teal);\">\n                        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"var(--primary-dark)\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n                    </div>\n                    <h3>Talent Discovery</h3>\n                </div>\n                <p>Find people by what they can do &mdash; not just what title they've held. One search surfaces exact matches, equivalent roles, and career-ready candidates in a single ranked list.</p>\n                <div class=\"hs-outcome-example\">\n                    <div class=\"hs-example-label\">Example</div>\n                    <div class=\"hs-example-text\">\"Find me DevOps Engineers\" returns SREs, Platform Engineers, and Backend Engineers in close proximity &mdash; expanding the qualified pool by 3&ndash;5x.</div>\n                </div>\n            </div>\n            <div class=\"hs-outcome-card\">\n                <div class=\"hs-outcome-header\">\n                    <div class=\"hs-outcome-icon\" style=\"background: var(--light-blue);\">\n                        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"var(--blue)\"><path d=\"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z\"/></svg>\n                    </div>\n                    <h3>Workforce Planning</h3>\n                </div>\n                <p>Map your organization's skill landscape against role requirements using proficiency scores. Identify gaps before they become critical &mdash; at individual, team, and org level.</p>\n                <div class=\"hs-outcome-example\">\n                    <div class=\"hs-example-label\">Example</div>\n                    <div class=\"hs-example-text\">\"Show me MLOps coverage across Data Science\" reveals low coverage across the team &mdash; flagging a strategic gap before it impacts delivery.</div>\n                </div>\n            </div>\n        </div>\n        <div class=\"hs-outcomes-col\">\n            <div class=\"hs-outcome-card\">\n                <div class=\"hs-outcome-header\">\n                    <div class=\"hs-outcome-icon\" style=\"background: #FFE8D4;\">\n                        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"var(--orange)\"><path d=\"M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z\"/></svg>\n                    </div>\n                    <h3>Internal Mobility & Succession</h3>\n                </div>\n                <p>Pre-computed proximity analysis makes succession planning queryable. Know who's closest to a target role, who needs development, and the specific skill gaps to close.</p>\n                <div class=\"hs-outcome-example\">\n                    <div class=\"hs-example-label\">Example</div>\n                    <div class=\"hs-example-text\">\"Who on my team is closest to Engineering Manager?\" returns ranked candidates with proximity signals, transferable skills, and development recommendations.</div>\n                </div>\n            </div>\n            <div class=\"hs-outcome-card\">\n                <div class=\"hs-outcome-header\">\n                    <div class=\"hs-outcome-icon\" style=\"background: #F3E8FF;\">\n                        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"var(--purple)\"><path d=\"M12 3L1 9l4 2.18v6L12 21l7-3.82v-6l2-1.09V17h2V9L12 3zm6.82 6L12 12.72 5.18 9 12 5.28 18.82 9zM17 15.99l-5 2.73-5-2.73v-3.72L12 15l5-2.73v3.72z\"/></svg>\n                    </div>\n                    <h3>Competitive Intelligence</h3>\n                </div>\n                <p>Understand the talent composition of any company, industry, or market. See skill concentrations, role distributions, and talent flow between organizations.</p>\n                <div class=\"hs-outcome-example\">\n                    <div class=\"hs-example-label\">Example</div>\n                    <div class=\"hs-example-text\">\"Where is AI/ML talent concentrated in fintech?\" shows company-level density, skill profiles, proficiency distributions, and migration trends.</div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"9\">\n        <h4>Speaker Notes</h4>\n        Let me show you the four major outcomes this intelligence enables. First, talent discovery &mdash; our search expands candidate pools by 3 to 5x because we surface equivalent roles and career-ready candidates, not just keyword matches. This works because the search vectors operate on our enriched data &mdash; canonicalized skills, resolved archetypes, proficiency scores. Second, workforce planning &mdash; we can map any organization's actual skill landscape against what's needed using our proficiency model and flag gaps before they're critical. Third, internal mobility and succession &mdash; proximity analysis is pre-computed, so you can query who's closest to Engineering Manager and get a ranked list with specific development recommendations. And fourth, competitive intelligence &mdash; we can show talent composition, skill density, proficiency distributions, and migration patterns for any company or industry. All of this is only possible because we've built the structured understanding of the worker universe &mdash; the taxonomy, the archetypes, the proficiency model, the career graph &mdash; and then search across all of it with four combined methods.\n    </div>\n</div>\n", "slides/20-job-profile-match.html": "<!-- Slide 11: Job Profile Matching — Live Data -->\n<div\n  class=\"slide slide-job-match\"\n  data-slide=\"11\"\n  style=\"background: var(--gray-bg); color: var(--black); padding: 40px 60px\"\n>\n  <div class=\"slide-header\">\n    <div class=\"slide-number\" style=\"color: var(--primary-dark)\">11</div>\n    <p\n      style=\"\n        color: var(--primary);\n        font-size: 13px;\n        font-weight: 700;\n        text-transform: uppercase;\n        letter-spacing: 3px;\n        margin-bottom: 8px;\n      \"\n    >\n      Outcomes\n    </p>\n    <h2\n      style=\"\n        font-size: 34px;\n        font-weight: 700;\n        color: var(--black);\n        margin-bottom: 4px;\n      \"\n    >\n n class=\"jm-cand-rank\">6</span>\n          <span class=\"jm-cand-name\"\n            ><span class=\"jm-redacted\">Candidate F</span></span\n          >\n          <span class=\"jm-cand-title\">Manager, Data Governance</span>\n          <span class=\"jm-cand-overlap\">8.3%</span>\n          <span class=\"jm-cand-skills\">3</span>\n          <span class=\"jm-cand-gap jm-gap-good\">0.33</span>\n        </div>\n        <div class=\"jm-cand-row\">\n          <span class=\"jm-cand-rank\">7</span>\n          <span class=\"jm-cand-name\"\n            ><span class=\"jm-redacted\">Candidate G</span></span\n          >\n          <span class=\"jm-cand-title\">Manager, Business Insights</span>\n          <span class=\"jm-cand-overlap\">8.3%</span>\n          <span class=\"jm-cand-skills\">3</span>\n          <span class=\"jm-cand-gap\">0.67</span>\n        </div>\n        <div class=\"jm-cand-row\">\n          <span class=\"jm-cand-rank\">8</span>\n          <span class=\"jm-cand-name\"\n            ><span class=\"jm-redacted\">Candidate H</span></span\n          >\n          <span class=\"jm-cand-title\">Lead Employer Analytics Analyst</span>\n          <span class=\"jm-cand-overlap\">8.3%</span>\n          <span class=\"jm-cand-skills\">3</span>\n          <span class=\"jm-cand-gap\">1.00</span>\n        </div>\n        <div class=\"jm-cand-row\">\n          <span class=\"jm-cand-rank\">9</span>\n          <span class=\"jm-cand-name\"\n            ><span class=\"jm-redacted\">Candidate I</span></span\n          >\n          <span class=\"jm-cand-title\">Director, Operational Analytics</span>\n          <span class=\"jm-cand-overlap\">8.3%</span>\n          <span class=\"jm-cand-skills\">3</span>\n          <span class=\"jm-cand-gap jm-gap-good\">0.33</span>\n        </div>\n        <div class=\"jm-cand-row\">\n          <span class=\"jm-cand-rank\">10</span>\n          <span class=\"jm-cand-name\"\n            ><span class=\"jm-redacted\">Candidate J</span></span\n          >\n          <span class=\"jm-cand-title\">Director Data Engineering</span>\n          <span class=\"jm-cand-overlap\">5.6%</span>\n          <span class=\"jm-cand-skills\">2</span>\n          <span class=\"jm-cand-gap\">1.00</span>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <div class=\"speaker-notes\" data-notes=\"11\">\n    <h4>Speaker Notes</h4>\n    Now let me show you real output from our platform. This is from a single\n    customer taxonomy &mdash; job profile matching across 18,000 job skills and\n    27,000 employee skills. Here's a Senior Manager Data Science role with 36\n    required skills. Our top match is a Senior Manager in Product Analytics\n    &mdash; 22% skill overlap with 8 matching skills and an average proficiency\n    gap of just 0.25. That means they're already proficient in almost everything\n    the role requires. Look at the skill-by-skill breakdown: 7 of 8 overlapping\n    skills are an exact match or better. Only Data Storytelling has a gap, and\n    it's just one level. They also bring 41 additional skills &mdash; analytics,\n    data engineering, predictive analytics &mdash; that transfer directly. And\n    below them, we have 9 more ranked candidates. This is the kind of\n    intelligence that powers both internal mobility and targeted upskilling\n    &mdash; you know exactly who's closest, what gaps remain, and what\n    certifications would close them.\n  </div>\n</div>\n", "slides/21-verizon-case-study.html": "<!-- Slide 10: Verizon Case Study -->\n<div class=\"slide slide-case-study\" data-slide=\"10\" style=\"background: linear-gradient(135deg, #0a1628 0%, #0d2137 50%, #0a1628 100%); padding: 40px 60px;\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\" style=\"color: var(--primary);\">10</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Outcomes</p>\n        <h2 style=\"font-size: 36px; font-weight: 700; color: var(--white); margin-bottom: 4px;\">Workforce Intelligence Infrastructure, Built for Enterprise Reality</h2>\n        <p style=\"color: rgba(255,255,255,0.65); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\"><span style=\"color: #00B6A1;\">Verizon, a global telecom provider, had a bold vision: enable personalized career mobility for every one of its 75,000 employees.</span> Censia delivered the foundation by turning fragmented workforce signals into Golden Records, normalized and enriched at scale with skills, proficiency scores, trajectory context, and other decision-ready signals. This made it possible for Verizon to drive measurable results across internal mobility, avoidable attrition, and career path visibility.</p>\n    </div>\n\n    <div class=\"case-study-layout\">\n        <!-- Left: Problem + Solution -->\n        <div class=\"case-study-left\">\n            <div class=\"case-problem-card\">\n                <div class=\"case-card-label problem-label\">The Problem</div>\n                <p style=\"color: rgba(255,255,255,0.75); font-size: 13px; line-height: 1.5; margin: 6px 0 6px;\">Only <strong>5%</strong> of employees had skills listed in their profiles, which meant:</p>\n                <ul class=\"case-bullet-list\">\n                    <li>Employees lacked clear career paths and next-step guidance.</li>\n                    <li>Skills weren&rsquo;t translated into adjacent roles or growth steps.</li>\n                    <li>Upskilling lacked clear targets tied to real role requirements.</li>\n                    <li>The organization couldn&rsquo;t quantify gaps or identify succession-ready candidates.</li>\n                </ul>\n            </div>\n\n            <div class=\"case-solution-card\">\n                <div class=\"case-card-label solution-label\">From Data to Action</div>\n                <p class=\"case-solution-text\"><span style=\"color: #FF9630;\">Censia delivered AI-enriched Golden Records across the enterprise, turning role, experience, and market signals into inferred skills, proficiency, and career intelligence.</span> Profiles were completed and standardized at scale without manual entry, giving every team a fair, decision-ready foundation for mobility and development.</p>\n            </div>\n        </div>\n\n        <!-- Right: Results metrics -->\n        <div class=\"case-study-right\">\n            <div class=\"case-card-label results-label\">Meaningful Outcomes at Scale</div>\n            <p style=\"color: var(--primary); font-size: 13px; font-weight: 600; margin: 4px 0 10px;\">Verizon&rsquo;s first year impact: $70M+ ROI</p>\n            <div class=\"case-metrics-grid\">\n                <div class=\"case-metric case-metric-hero\">\n                    <div class=\"case-metric-before\">5%</div>\n                    <div class=\"case-metric-arrow\">&rarr;</div>\n                    <div class=\"case-metric-after\">100%</div>\n                    <div class=\"case-metric-label\">Workforce Skills Coverage</div>\n                    <div class=\"case-metric-sub\">Robust skills enrichment scaled to 75,000 employees.</div>\n                </div>\n                <div class=\"case-metric case-metric-hero\">\n                    <div class=\"case-metric-after\">+85%</div>\n                    <div class=\"case-metric-label\">Accuracy</div>\n                    <div class=\"case-metric-sub\">AI-inferred skills validated directly by employees.</div>\n                </div>\n                <div class=\"case-metric\">\n                    <div class=\"case-metric-after\">&#8593;26%</div>\n                    <div class=\"case-metric-label\">Internal Mobility</div>\n                    <div class=\"case-metric-sub\">Increased internal mobility, lowering reliance on external hiring.</div>\n                </div>\n                <div class=\"case-metric\">\n                    <div class=\"case-metric-after\">&#8595;82%</div>\n                    <div class=\"case-metric-label\">Unwanted Attrition Reduction</div>\n                    <div class=\"case-metric-sub\">Improved retention of high-value employees, reducing attrition costs.</div>\n                </div>\n                <div class=\"case-metric\">\n                    <div class=\"case-metric-after\">$29M</div>\n                    <div class=\"case-metric-label\">Operational Savings</div>\n                    <div class=\"case-metric-sub\">AI skills automation replaced manual skills updates, converting employee time into savings.</div>\n                </div>\n                <div class=\"case-metric case-metric-impact\">\n                    <div class=\"case-metric-after\" style=\"font-size: 28px;\">75K</div>\n                    <div class=\"case-metric-label\">Hours Saved Quarterly</div>\n                    <div class=\"case-metric-sub\">Automating skills removed thousands of hours of manual employee work.</div>\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <!-- Bottom: Outcomes + Quotes -->\n    <div class=\"case-bottom-row\">\n        <div class=\"case-outcomes\">\n            <div class=\"case-outcome-tag\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"var(--primary)\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg> Internal mobility matching</div>\n            <div class=\"case-outcome-tag\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"var(--primary)\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg> Skills-based career pathing</div>\n            <div class=\"case-outcome-tag\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"var(--primary)\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg> Earlier gap identification</div>\n            <div class=\"case-outcome-tag\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"var(--primary)\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg> Reduced time-to-fill</div>\n            <div class=\"case-outcome-tag\"><svg viewBox=\"0 0 24 24\" width=\"14\" height=\"14\" fill=\"var(--primary)\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg> Skills-based pay foundation</div>\n        </div>\n        <div class=\"case-quotes\">\n            <p style=\"color: rgba(255,255,255,0.65); font-size: 13px; line-height: 1.5; margin: 0 0 10px;\">With enriched skills insights that reflected their real experience and career journey, employees felt more seen, more capable, and more inspired to take their next step:</p>\n            <div class=\"case-quote\">\n                <span class=\"quote-mark\">&ldquo;</span>This isn&rsquo;t just about data. It&rsquo;s about unlocking personalized career journeys, bespoke development plans, and tailored learning opportunities for everyone in our organizations.<span class=\"quote-mark\">&rdquo;</span>\n                <span class=\"quote-attribution\">&mdash;Chief Learning Officer, Verizon</span>\n            </div>\n        </div>\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"10\">\n        <h4>Speaker Notes</h4>\n        This is what it looks like in production. Verizon came to us with a workforce visibility problem &mdash; only 5% Career Hub adoption, 95% of profiles empty. In weeks, we delivered AI-enriched Golden Records across the entire enterprise. Workforce visibility went from 5% to 100%. We expanded their skills data from 377,000 to 2.4 million mapped skills &mdash; a 6.4x expansion. At the executive level, skill depth nearly tripled. And employees loved it &mdash; direct quotes about discovering skills they'd forgotten they had. This is the foundation that makes gap analysis and career pathing possible. Without visibility, you can't act.\n    </div>\n</div>\n"};
