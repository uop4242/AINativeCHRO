// ── Embedded slide data (injected by export.py) ──────────
const __EMBEDDED_SLIDES__ = {"slides/00-title.html": "<!-- Slide 0: Title -->\n<div class=\"slide slide-title active\" data-slide=\"0\">\n    <div class=\"title-content\">\n        <h1>The Next Generation Workforce Intelligence Platform</h1>\n        <p class=\"subtitle\">Built from years of observed career paths and skill drift, so AI systems can recommend actions that stay grounded as work changes.</p>\n    </div>\n    <div class=\"title-decoration\">\n        <div class=\"dot\"></div>\n        <div class=\"dot\"></div>\n        <div class=\"dot\"></div>\n        <div class=\"dot\"></div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"0\">\n        <h4>Speaker Notes</h4>\n        Censia is a talent intelligence platform built on over a decade of people data. We process data on hundreds of millions of professionals and transform it into actionable workforce intelligence. Today I want to show you how we do that, and specifically how we power skills gap analysis and career transition pathways.\n    </div>\n</div>\n", "slides/01-intro.html": "<!-- Slide 1: Intro Manifesto -->\n<div class=\"slide slide-intro\" data-slide=\"1\">\n    <div class=\"intro-content\">\n        <h1 class=\"intro-headline\">The World's Talent Data Is Broken.<br><span class=\"highlight\">We Fixed It.</span></h1>\n\n        <p class=\"intro-manifesto\">\n            For close to a decade, Censia has built and continues to build the domain intelligence to make sense of the world's messiest data:\n            talent data. <span style=\"color: var(--primary)\">We track and contextualize over 550M professionals,</span> but the real value is what\n            we've learned. How roles evolve. How responsibilities overlap across industries. What a title or skill\n            actually means in context, not just today, but over the past decade. As AI reshapes every role\n            in every industry, that understanding is what separates useful output from noise.\n        </p>\n\n        <div class=\"intro-pillars\">\n            <div class=\"intro-pillar\" style=\"border-left-color: #FF9630;\">\n                <h3 class=\"intro-pillar-title\" style=\"color: #FF9630;\">The Data Problem</h3>\n                <p class=\"intro-pillar-desc\">Fragmented, inconsistent, unreliable talent data across every source. Resumes, job posts, HR systems, the open web. The complexity in this domain defeats general-purpose approaches.</p>\n            </div>\n            <div class=\"intro-pillar\" style=\"border-left-color: #6861E2;\">\n                <h3 class=\"intro-pillar-title\" style=\"color: #6861E2;\">The AI Imperative</h3>\n                <p class=\"intro-pillar-desc\">Understanding how to upskill and reskill people as AI reshapes roles, industries, and the nature of work itself.</p>\n            </div>\n            <div class=\"intro-pillar\">\n                <h3 class=\"intro-pillar-title\">The Intelligence Layer</h3>\n                <p class=\"intro-pillar-desc\">Domain-specific models that structure and enrich talent data. The preprocessing that makes downstream AI produce results you can trust.</p>\n            </div>\n            <div class=\"intro-pillar\" style=\"border-left-color: #3894DC;\">\n                <h3 class=\"intro-pillar-title\" style=\"color: #3894DC;\">The Foundation</h3>\n                <p class=\"intro-pillar-desc\">Powers certifications, career pathways, workforce planning, and precision talent matching at scale.</p>\n            </div>\n        </div>\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"1\">\n        <h4>Speaker Notes</h4>\n        Talent data is the messiest data on the planet. Fragmented across millions of sources, riddled with inconsistencies. Profiles are everywhere. The hard part is understanding what they actually mean. What a role required 8 years ago versus today. How responsibilities shift and overlap across companies and industries. We spent 8+ years building the domain-specific models to structure this: canonicalizing skills, resolving titles, scoring proficiency, tracking how the talent landscape evolves over time. Now, as AI reshapes every industry, that deep domain intelligence becomes the foundation for everything from workforce planning to precision matching.\n    </div>\n</div>\n", "slides/02-data-pipeline.html": "<!-- Slide 02: From Raw Data to Structured Intelligence -->\n<div class=\"slide slide-content slide-data-pipeline\" id=\"pipelineSlide\" data-slide=\"1\" style=\"background: linear-gradient(135deg, #0a0f14 0%, #0d1a1f 50%, #0a1614 100%); color: white; overflow: hidden;\">\n\n    <!-- Particle layer — full bleed, above bg glow, below content -->\n    <div id=\"dpParticleContainer\" style=\"position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;\"></div>\n\n    <!-- Ambient glow background -->\n    <div class=\"dp-ambient-glow\"></div>\n\n    <div class=\"slide-header\" style=\"position: relative; z-index: 10;\">\n        <div class=\"slide-number\" style=\"color: #00B6A1;\">02</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Overview</p>\n        <h2 class=\"slide-title-text\" style=\"color: white;\">From Raw Data to Structured Intelligence</h2>\n        <p style=\"color: rgba(255,255,255,0.65); font-size: 14px; font-weight: 400; margin-top: 8px; line-height: 1.6;\">\n            Censia has spent nearly a decade building\n            <strong style=\"color: #FF9630\">a structured entity graph of over 550M professional profiles, spanning people, skills, roles, companies, industries, and the relationships between them.</strong>\n            It is sourced from thousands of data sources, then normalized, deduplicated, and continuously enriched with validated and AI-inferred attributes.\n            <em>Think of it as the professional world&rsquo;s equivalent of Google&rsquo;s Knowledge Graph&mdash;not keyword matching, but true contextual understanding.</em>\n            <strong style=\"color: #00B6A1;\">Censia knows far more than where someone worked; it understands their role, inferred skills, career trajectory, and how they connect to thousands of other entities across the labor market.</strong>\n        </p>\n    </div>\n\n    <!-- Metrics Bar -->\n    <div class=\"dp-metrics-bar\" style=\"position: relative; z-index: 10;\">\n        <div class=\"dp-metric\">\n            <span class=\"dp-metric-value\">550M+</span>\n            <span class=\"dp-metric-label\">Profiles</span>\n        </div>\n        <div class=\"dp-metric\">\n            <span class=\"dp-metric-value\">50+TB</span>\n            <span class=\"dp-metric-label\">Raw Data</span>\n        </div>\n        <div class=\"dp-metric\">\n            <span class=\"dp-metric-value\">50+</span>\n            <span class=\"dp-metric-label\">AI Models</span>\n        </div>\n        <div class=\"dp-metric\">\n            <span class=\"dp-metric-value\">125B+</span>\n            <span class=\"dp-metric-label\">Tokens</span>\n        </div>\n        <div class=\"dp-metric\">\n            <span class=\"dp-metric-value\">1.5B</span>\n            <span class=\"dp-metric-label\">Career Moves</span>\n        </div>\n    </div>\n\n    <!-- Main Flow: Sources → Pipeline → Golden Record -->\n    <div class=\"dp-flow\" style=\"position: relative; z-index: 10;\">\n\n        <!-- Left: Source Pills -->\n        <div class=\"dp-sources\">\n            <div class=\"dp-section-label\">DATA SOURCES</div>\n            <div class=\"dp-source-pill\" data-color=\"#3B94DC\" style=\"--pill-color: rgba(59, 148, 220, 0.15); --pill-border: rgba(59, 148, 220, 0.3); --pill-text: #BCE1FE; --pill-glow: rgba(59, 148, 220, 0.3);\">\n                <span class=\"dp-pill-glow\"></span>\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#3B94DC\"><path d=\"M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 l-border: rgba(0, 182, 161, 0.3); --pill-text: #D4F3F0; --pill-glow: rgba(0, 182, 161, 0.3);\">\n                <span class=\"dp-pill-glow\"></span>\n                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#00B6A1\"><path d=\"M22 11V3h-7v3H9V3H2v8h7V8h2v10h4v3h7v-8h-7v3h-2V8h2v3z\"/></svg>\n                <span>Skills Ontology</span>\n            </div>\n        </div>\n\n        <!-- Center: Pipeline Track -->\n        <div class=\"dp-pipeline-track\">\n            <div class=\"dp-track-label\">THE TRANSFORMATION PIPELINE</div>\n            <div class=\"dp-stages-row\">\n                <div class=\"dp-hstage\" id=\"dpStage1\" style=\"--stage-color: #FF9630;\">\n                    <div class=\"dp-hstage-num\">01</div>\n                    <div class=\"dp-hstage-name\">Ingest</div>\n                    <div class=\"dp-hstage-desc\">Stage and pull from raw sources</div>\n                </div>\n                <div class=\"dp-hstage-arrow\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"1.5\"><path d=\"M5 12h14M15 6l6 6-6 6\"/></svg>\n                </div>\n                <div class=\"dp-hstage\" id=\"dpStage2\" style=\"--stage-color: #3B94DC;\">\n                    <div class=\"dp-hstage-num\">02</div>\n                    <div class=\"dp-hstage-name\">Normalize / Standardize</div>\n                    <div class=\"dp-hstage-desc\">Clean formats, resolve conflicts, unify schemas</div>\n                </div>\n                <div class=\"dp-hstage-arrow\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"1.5\"><path d=\"M5 12h14M15 6l6 6-6 6\"/></svg>\n                </div>\n                <div class=\"dp-hstage\" id=\"dpStage3\" style=\"--stage-color: #6861E2;\">\n                    <div class=\"dp-hstage-num\">03</div>\n                    <div class=\"dp-hstage-name\">Group &amp; Merge</div>\n                    <div class=\"dp-hstage-desc\">Entity resolution across 550M profiles</div>\n                </div>\n                <div class=\"dp-hstage-arrow\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"1.5\"><path d=\"M5 12h14M15 6l6 6-6 6\"/></svg>\n                </div>\n                <div class=\"dp-hstage\" id=\"dpStage4\" style=\"--stage-color: #00B6A1;\">\n                    <div class=\"dp-hstage-num\">04</div>\n                    <div class=\"dp-hstage-name\">Score &amp; Label</div>\n                    <div class=\"dp-hstage-desc\">NLP + ML models for seniority, function &amp; vectors</div>\n                    <div class=\"dp-hstage-tags\">\n                        <span class=\"dp-htag\" style=\"color: #00B6A1; border-color: rgba(0,182,161,0.3);\">NLP</span>\n                        <span class=\"dp-htag\" style=\"color: #6861E2; border-color: rgba(104,97,226,0.3);\">ML</span>\n                    </div>\n                </div>\n                <div class=\"dp-hstage-arrow\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"rgba(255,255,255,0.2)\" stroke-width=\"1.5\"><path d=\"M5 12h14M15 6l6 6-6 6\"/></svg>\n                </div>\n                <div class=\"dp-hstage\" id=\"dpStage5\" style=\"--stage-color: #22C55E;\">\n                    <div class=\"dp-hstage-num\">05</div>\n                    <div class=\"dp-hstage-name\">Index &amp; Embed</div>\n                    <div class=\"dp-hstage-desc\">Vectorized, searchable intelligence</div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Right: Golden Record Orb -->\n        <div class=\"dp-golden-record\">\n            <div class=\"dp-orb-container\">\n                <div class=\"dp-orb-outer-ring\" id=\"dpOrbOuterRing\"></div>\n                <div class=\"dp-orb-pulse-ring\" id=\"dpOrbPulseRing\"></div>\n                <div class=\"dp-orb\" id=\"dpOrb\">\n                    <svg width=\"36\" height=\"36\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\">\n                        <circle cx=\"12\" cy=\"12\" r=\"10\"/>\n                        <path d=\"M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z\"/>\n                        <path d=\"M2 12h20\"/>\n                    </svg>\n                </div>\n            </div>\n            <div class=\"dp-orb-label\">GOLDEN RECORD</div>\n        </div>\n    </div>\n\n    <!-- Bottom Callout -->\n    <div class=\"dp-callout\" style=\"position: relative; z-index: 10;\">\n        Every profile is a living record &mdash; enriched with inferred skills, proficiency signals, X-Factors, and career trajectory intelligence.\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"0\">\n        <h4>Speaker Notes</h4>\n        Let me walk you through how we actually build the intelligence layer. It starts with data — and not the clean kind. We're pulling from hundreds of sources: people data, company data, job demand signals, industry classifications, salary benchmarks. It comes in every format imaginable, full of inconsistencies and duplicates.\n\n        The pipeline has five stages. First, we ingest everything — raw pulls from all these sources. Then we normalize and standardize — cleaning up encoding issues, format conflicts, and schema mismatches across providers.\n\n        The third stage is where it gets interesting: group and merge. Our entity resolution algorithms compare entire work histories to figure out which records belong to the same person, the same company, the same role. This is the hardest part — we're de-duplicating and linking across 550 million profiles.\n\n        Fourth, we score and label everything. Recency scoring, maturity scoring, seniority classification, organizational function labeling, and dozens of other derived attributes. We also compute dense vector representations across multiple dimensions for downstream intelligence.\n\n        Finally, we index and embed. Sparse embedding models are applied during the indexing pipeline to produce the final structured, searchable output. The transformation is dramatic: we go from what I call \"data slop\" — messy, inconsistent, duplicated — to clean, structured, scored intelligence — a Golden Record for every professional.\n    </div>\n</div>\n", "slides/04-skills-challenge.html": "<!-- Slide 2: The Skills Challenge -->\n<div class=\"slide slide-content\" data-slide=\"2\">\n    <div class=\"slide-header\" >\n        <div class=\"slide-number\">04</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Overview</p>\n        <h2 class=\"slide-title-text\">Why Skills Are the Hardest Problem</h2>\n        <p style=\"color: var(--dim); font-size: 13px; font-weight: 400; margin-top: 6px; line-height: 1.6;\">Skills data arrives as fragmented strings; without canonical resolution, matching degrades and systems reason over aliases, not capability.</p>\n    </div>\n    <div class=\"problem-grid\">\n        <div class=\"mess-cloud\">\n            <div class=\"label\">&#x274C; The Reality: One skill, countless variations</div>\n            <div class=\"variant-legend\">\n                <div class=\"variant-legend-item typo\"><span class=\"dot\"></span>Typos</div>\n                <div class=\"variant-legend-item abbrev\"><span class=\"dot\"></span>Abbreviations</div>\n                <div class=\"variant-legend-item lang\"><span class=\"dot\"></span>Languages</div>\n                <div class=\"variant-legend-item special\"><span class=\"dot\"></span>Formatting</div>\n                <div class=\"variant-counter\"><span id=\"variantCount\">0</span> variants found</div>\n            </div>\n            <div class=\"variant-tags\">\n                <!-- Standard variations -->\n                <div class=\"variant-tag\">AI Governance and Ethics</div>\n                <div class=\"variant-tag\">AI Ethics &amp; Governance</div>\n                <div class=\"variant-tag\">AI Ethics and Governance</div>\n                <div class=\"variant-tag\">Artificial Intelligence Ethics</div>\n                <div class=\"variant-tag\">Artificial Intelligence Governance</div>\n                <div class=\"variant-tag\">AI Ethics Management</div>\n\n                <!-- Typos -->\n                <div class=\"variant-tag typo\">AI Ethcis &amp; Governance</div>\n                <div class=\"variant-tag typo\">AI Goverance and Ethics</div>\n                <div class=\"variant-tag typo\">Artifical Intelligence Ethics</div>\n                <div class=\"variant-tag typo\">AI Ethis and Governence</div>\n                <div class=\"variant-tag typo\">AI Governace &amp; Ethcis</div>\n                <div class=\"variant-tag typo\">Artficial Inteligence Ethics</div>\n\n                <!-- Abbreviations -->\n                <div class=\"variant-tag abbrev\">AI Gov/Ethics</div>\n                <div class=\"variant-tag abbrev\">AI E&amp;G</div>\n                <div class=\"variant-tag abbrev\">AI Ethics Mgmt</div>\n                <div class=\"variant-tag abbrev\">A.I. Ethics &amp; Gov</div>\n                <div class=\"variant-tag abbrev\">AI Gov &amp; Ethics</div>\n                <div class=\"variant-tag abbrev\">AI Eth/Gov</div>\n                <div class=\"variant-tag abbrev\">AIEthics</div>\n\n                <!-- Different languages -->\n                <div class=\"variant-tag lang\">IA &#201;tica y Gobernanza</div>\n                <div class=\"variant-tag lang\">&#201;thique de l'IA</div>\n                <div class=\"variant-tag lang\">KI-Ethik und Governance</div>\n                <div class=\"variant-tag lang\">AI&#20523;&#29702;&#12392;&#12460;&#12496;&#12490;&#12531;&#12473;</div>\n                <div class=\"variant-tag lang\">&#20154;&#24037;&#26234;&#33021;&#20262;&#29702;</div>\n                <div class=\"variant-tag lang\">&#201;tica da IA</div>\n                <div class=\"variant-tag lang\">AI &#50980;&#47532; &#48143; &#44144;&#48260;&#45324;&#49828;</div>\n\n                <!-- Special characters & formatting -->\n                <div class=\"variant-tag special\">AI - Ethics - Governance</div>\n                <div class=\"variant-tag special\">AI_Ethics_Governance</div>\n                <div class=\"variant-tag special\">AI/Ethics/Governance</div>\n                <div class=\"variant-tag special\">\"AI Ethics\"</div>\n                <div class=\"variant-tag special\">AI (Ethics &amp; Governance)</div>\n                <div class=\"variant-tag special\">ai ethics and governance</div>\n                <div class=\"variant-tag special\">AI ETHICS AND GOVERNANCE</div>\n                <div class=\"variant-tag special\">Ai Ethics And Governance</div>\n\n                <!-- More variations -->\n                <div class=\"variant-tag\">Ethical AI Governance</div>\n                <div class=\"variant-tag\">Ethics in AI</div>\n                <div class=\"variant-tag\">Responsible AI Governance</div>\n                <div class=\"variant-tag\">AI Ethics Framework</div>\n                <div class=\"variant-tag typo\">AI Ehtics Managment</div>\n                <div class=\"variant-tag abbrev\">Resp. AI Gov.</div>\n            </div>\n        </div>\n        <div class=\"canonical-result\">\n            <div class=\"label\">&#x2713; The Goal</div>\n            <div class=\"big-number\" id=\"canonicalCount\">1</div>\n            <div class=\"big-number-label\">canonical skill</div>\n            <div class=\"canonical-tag\">\n                <span class=\"check\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg>\n                </span>\n                AI Ethics &amp; Governance\n            </div>\n        </div>\n        <div class=\"dimension-cards\">\n            <div class=\"dimension-card\">\n                <div class=\"dimension-icon\" style=\"background: rgba(255, 150, 48, 0.15);\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#FF9630\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z\"/></svg>\n                </div>\n                <div class=\"dimension-content\">\n                    <h3>Polysemy</h3>\n                    <p>\"IP\" means different things for a patent attorney vs. a network engineer</p>\n                </div>\n            </div>\n            <div class=\"dimension-card\">\n                <div class=\"dimension-icon\" style=\"background: rgba(104, 97, 226, 0.15);\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#6861E2\"><path d=\"M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z\"/></svg>\n                </div>\n                <div class=\"dimension-content\">\n                    <h3>Temporal Drift</h3>\n                    <p>Skills emerge, evolve, and sunset &mdash; \"prompt engineering\" didn't exist 5 years ago</p>\n                </div>\n            </div>\n            <div class=\"dimension-card\">\n                <div class=\"dimension-icon\" style=\"background: rgba(59, 148, 220, 0.15);\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#3B94DC\"><path d=\"M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0 0 14.07 6H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z\"/></svg>\n                </div>\n                <div class=\"dimension-content\">\n                    <h3>No Common Language</h3>\n                    <p>Every company, every system, every person describes skills differently</p>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"2\">\n        <h4>Speaker Notes</h4>\n        Before you can analyze gaps or map pathways, you need a common language. And skills are the messiest data in HR. One concept can appear as hundreds of variants. The same acronym means different things in different contexts. Skills emerge and sunset over time. And every company describes them differently. This is the problem we solve.\n    </div>\n</div>\n", "slides/05-convergence.html": "<!-- Slide 4: From Chaos to Clarity -->\n<div class=\"slide slide-content\" data-slide=\"4\" id=\"convergenceSlide\" style=\"background: linear-gradient(135deg, #0a0f14 0%, #0d1a1f 50%, #0a1614 100%); color: white; overflow: hidden;\">\n    <!-- Particle container for animations -->\n    <div id=\"particleContainer\" style=\"position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;\"></div>\n\n    <div class=\"slide-header\">\n        <div class=\"slide-number\" style=\"color: #00B6A1;\">04</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Overview</p>\n        <h2 class=\"slide-title-text\" style=\"color: white;\">Canonization in Action — A Real Client Delivery</h2>\n        <p style=\"color: rgba(255,255,255,0.65); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Censia AI continuously cleans and validates company-specific taxonomies, so matching, pathways, and gap analysis stay precise.</p>\n    </div>\n\n    <div id=\"convergenceGrid\" style=\"display: grid; grid-template-columns: 1fr 200px 1fr; gap: 40px; align-items: center; justify-content: center; flex: 1; position: relative; z-index: 10; max-width: 1400px; margin: 0 auto;\">\n        <!-- Left: Inputs -->\n        <div id=\"inputsSection\" style=\"display: flex; flex-direction: column; gap: 10px;\">\n            <div style=\"font-family: 'Space Mono', monospace; font-size: 10px; color: #00B6A1; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px;\">Inputs from Every Source</div>\n\n            <div id=\"inputPillsGrid\" style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 6px;\">\n                <div class=\"input-pill-anim\" data-color=\"#3B94DC\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(59, 148, 220, 0.15); border: 1px solid rgba(59, 148, 220, 0.3); color: #BCE1FE; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(59, 148, 220, 0.3), transparent); pointer-events: none;\"></span>\n                    Employee Profiles\n                </div>\n                <div class=\"input-pill-anim\" data-color=\"#3B94DC\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(59, 148, 220, 0.15); border: 1px solid rgba(59, 148, 220, 0.3); color: #BCE1FE; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(59, 148, 220, 0.3), transparent); pointer-events: none;\"></span>\n                    Job Descriptions\n                </div>\n                <div class=\"input-pill-anim\" data-color=\"#FF9630\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(255, 150, 48, 0.15); border: 1px solid rgba(255, 150, 48, 0.3); color: #FFD4A8; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 150, 48, 0.3), transparent); pointer-events: none;\"></span>\n                    Work History\n                </div>\n                <div class=\"input-pill-anim\" data-color=\"#FF9630\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(255, 150, 48, 0.15); border: 1px solid rgba(255, 150, 48, 0.3); color: #FFD4A8; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 150, 48, 0.3), transparent); pointer-events: none;\"></span>\n                    Company Context\n                </div>\n                <div class=\"input-pill-anim\" data-color=\"#6861E2\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(104, 97, 226, 0.15); border: 1px solid rgba(104, 97, 226, 0.3); color: #C4C1F7; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(104, 97, 226, 0.3), transparent); pointer-events: none;\"></span>\n                    Industry Data\n                </div>\n                <div class=\"input-pill-anim\" data-color=\"#6861E2\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(104, 97, 226, 0.15); border: 1px solid rgba(104, 97, 226, 0.3); color: #C4C1F7; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(104, 97, 226, 0.3), transparent); pointer-events: none;\"></span>\n                    HCM Systems\n                </div>\n                <div class \"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 150, 48, 0.3), transparent); pointer-events: none;\"></span>\n                    Certifications\n                </div>\n                <div class=\"input-pill-anim\" data-color=\"#3B94DC\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(59, 148, 220, 0.15); border: 1px solid rgba(59, 148, 220, 0.3); color: #BCE1FE; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(59, 148, 220, 0.3), transparent); pointer-events: none;\"></span>\n                    Learning History\n                </div>\n                <div class=\"input-pill-anim\" data-color=\"#F97316\" style=\"padding: 8px 10px; border-radius: 6px; font-size: 10px; background: rgba(249, 115, 22, 0.15); border: 1px solid rgba(249, 115, 22, 0.3); color: #FDBA74; position: relative; overflow: hidden;\">\n                    <span class=\"pill-glow\" style=\"position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(249, 115, 22, 0.3), transparent); pointer-events: none;\"></span>\n                    Skills Cloud\n                </div>\n            </div>\n        </div>\n\n        <!-- Center: The Canonizer Orb -->\n        <div id=\"orbSection\" style=\"display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 280px;\">\n            <div style=\"position: relative; width: 200px; height: 200px; display: flex; align-items: center; justify-content: center;\">\n                <div id=\"orbOuterRing\" style=\"position: absolute; width: 200px; height: 200px; border: 1px dashed rgba(0, 182, 161, 0.3); border-radius: 50%; top: 50%; left: 50%; transform: max-width: 320px;\">\n                <div style=\"width: 28px; height: 28px; border-radius: 6px; background: rgba(255, 150, 48, 0.2); display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">\n                    <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"#FF9630\"><path d=\"M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z\"/></svg>\n                </div>\n                <p style=\"font-size: 11px; color: rgba(255, 255, 255, 0.8); line-height: 1.4; margin: 0;\"><strong style=\"color: #FF9630;\">Fully Configurable</strong> &mdash; refined to customer needs</p>\n            </div>\n        </div>\n    </div>\n\n    <div class=\"engine-process-strip\">\n        <div class=\"engine-process-steps\">\n            <span class=\"engine-step\">Density Clustering</span>\n            <span class=\"engine-arrow\">&rarr;</span>\n            <span class=\"engine-step\">Multi-Pass Refinement</span>\n            <span class=\"engine-arrow\">&rarr;</span>\n            <span class=\"engine-step\">Validation Gates</span>\n            <span class=\"engine-arrow\">&rarr;</span>\n            <span class=\"engine-step\">Convergence</span>\n        </div>\n        <div class=\"engine-process-note\">Our engine is built for continuous refinement—merging duplicates, resolving fragments, and validating edge cases with quality gates—until the taxonomy converges into a stable foundation for high-confidence matching at scale.</div>\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"4\">\n        <h4>Speaker Notes</h4>\n        Here's what it looks like in action. We take all of these signals &mdash; employee profiles, job descriptions, work histories, certifications, learning data &mdash; everything. We feed it through our canonization engine. On the other side: a clean, navigable Skill Universe. Hundreds of thousands of messy strings reduced to a precise, structured taxonomy. This is the foundation for everything that follows.\n    </div>\n</div>\n", "slides/06-taxonomy.html": "<!-- Slide 3: A Living Taxonomy Built for Your Organization -->\n<div class=\"slide slide-content\" data-slide=\"3\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">03</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Overview</p>\n        <h2 class=\"slide-title-text\">A Living Taxonomy That Makes Workforce Data AI-Ready</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Censia AI ingests signals and resolves messy skill strings into a dynamic skills intelligence layer that becomes the foundation for everything that follows.</p>\n    </div>\n\n    <div class=\"taxonomy-bridge\">\n        <!-- Column 1: Employee Skills (unique, personal) -->\n        <div class=\"bridge-col bridge-col-left\">\n            <div class=\"bridge-col-label\">How Employees Describe Skills</div>\n            <div class=\"bridge-col-note\">Unique to their experience &mdash; shaped by tools, projects, and context</div>\n            <div class=\"variant-pill variant-teal\" data-group=\"ml\">Python ML Pipelines w/ Kubeflow</div>\n            <div class=\"variant-pill variant-teal\" data-group=\"ml\">Deep Learning (PyTorch, CNNs)</div>\n            <div class=\"variant-pill variant-teal\" data-group=\"ml\">Predictive Model Development</div>\n            <div class=\"variant-pill variant-blue\" data-group=\"cloud\">AWS Lambda &amp; Step Functions</div>\n            <div class=\"variant-pill variant-blue\" data-group=\"cloud\">K8s Cluster Orchestration</div>\n            <div class=\"variant-pill variant-blue\" data-group=\"cloud\">Cloud Architecture (Terraform)</div>\n            <div class=\"variant-pill variant-purple\" data-group=\"finance\">Financial Modelling &amp; DCF</div>\n            <div class=\"variant-pill variant-purple\" data-group=\"finance\">FP&amp;A / Variance Analysis</div>\n            <div class=\"variant-pill variant-orange\" data-group=\"pm\">Agile Coaching (SAFe, Scrum)</div>\n            <div class=\"variant-pill variant-orange\" data-group=\"pm\">Program Delivery &amp; Roadmaps</div>\n        </div>\n\n        <!-- Column 2: Canonical Bridge -->\n        <div class=\"bridge-col bridge-col-center\">\n            <div class=\"bridge-col-label\">Canonical Skills</div>\n            <div class=\"bridge-col-note\">The bridge &mdash; one standardized skill for many variants</div>\n            <div class=\"canonical-hub hub-teal\" data-group=\"ml\">\n                <span class=\"hub-name\">Machine Learning</span>\n                <span class=\"hub-count\">85 variants</span>\n            </div>\n            <div class=\"canonical-hub hub-blue\" data-group=\"cloud\">\n                <span class=\"hub-name\">Cloud Infrastructure</span>\n                <span class=\"hub-count\">61 variants</span>\n            </div>\n            <div class=\"canonical-hub hub-purple\" data-group=\"finance\">\n                <span class=\"hub-name\">Financial Analysis</span>\n                <span class=\"hub-count\">39 variants</span>\n            </div>\n            <div class=\"canonical-hub hub-orange\" data-group=\"pm\">\n                <span class=\"hub-name\">Agile Project Mgmt</span>\n                <span class=\"hub-count\">53 variants</span>\n            </div>\n        </div>\n\n        <!-- Column 3: Job Profiles (canonized skills on profiles) -->\n        <div class=\"bridge-col bridge-col-right\">\n            <div class=\"bridge-col-label\">Job Profiles</div>\n            <div class=\"bridge-col-note\">Canonized skills define what each role requires</div>\n            <div class=\"job-profile-tile\">\n                <div class=\"job-profile-title\">ML Engineer</div>\n                <div class=\"job-profile-skill job-skill-teal\" data-group=\"ml\">Machine Learning <span class=\"job-level\">Expert</span></div>\n                <div class=\"job-profile-skill job-skill-blue\" data-group=\"cloud\">Cloud Infrastructure <span class=\"job-level\">Advanced</span></div>\n            </div>\n            <div class=\"job-profile-tile\">\n                <div class=\"job-profile-title\">Finance Manager</div>\n                <div class=\"job-profile-skill job-skill-purple\" data-group=\"finance\">Financial Analysis <span class=\"job-level\">Expert</span></div>\n                <div class=\"job-profile-skill job-skill-orange\" data-group=\"pm\">Agile Project Mgmt <span class=\"job-level\">Advanced</span></div>\n            </div>\n            <div class=\"job-profile-tile\">\n                <div class=\"job-profile-title\">Platform Engineer</div>\n                <div class=\"job-profile-skill job-skill-blue\" data-group=\"cloud\">Cloud Infrastructure <span class=\"job-level\">Expert</span></div>\n                <div class=\"job-profile-skill job-skill-teal\" data-group=\"ml\">Machine Learning <span class=\"job-level\">Advanced</span></div>\n            </div>\n        </div>\n\n        <!-- SVG overlay for connecting curves -->\n        <svg class=\"bridge-svg\" id=\"bridgeSvg\"></svg>\n    </div>\n\n    <!-- Gap Analysis Dimensions -->\n    <div class=\"bridge-gap-section\">\n        <div class=\"bridge-gap-header\">Because every canonical carries dimensional labels, you can measure gaps on any axis:</div>\n        <div class=\"bridge-gap-bars\">\n            <div class=\"bridge-gap-row\">\n                <span class=\"bridge-gap-label\">Digital Readiness</span>\n                <div class=\"bridge-gap-track\">\n                    <div class=\"bridge-gap-fill gap-fill-employee\" style=\"width: 72%\"></div>\n                    <div class=\"bridge-gap-fill gap-fill-required\" style=\"width: 90%\"></div>\n                </div>\n            </div>\n            <div class=\"bridge-gap-row\">\n                <span class=\"bridge-gap-label\">AI Readiness</span>\n                <div class=\"bridge-gap-track\">\n                    <div class=\"bridge-gap-fill gap-fill-employee\" style=\"width: 45%\"></div>\n                    <div class=\"bridge-gap-fill gap-fill-required\" style=\"width: 78%\"></div>\n                </div>\n            </div>\n            <div class=\"bridge-gap-row\">\n                <span class=\"bridge-gap-label\">Cloud Coverage</span>\n                <div class=\"bridge-gap-track\">\n                    <div class=\"bridge-gap-fill gap-fill-employee\" style=\"width: 61%\"></div>\n                    <div class=\"bridge-gap-fill gap-fill-required\" style=\"width: 85%\"></div>\n                </div>\n            </div>\n            <div class=\"bridge-gap-row\">\n                <span class=\"bridge-gap-label\">Leadership</span>\n                <div class=\"bridge-gap-track\">\n                    <div class=\"bridge-gap-fill gap-fill-employee\" style=\"width: 80%\"></div>\n                    <div class=\"bridge-gap-fill gap-fill-required\" style=\"width: 75%\"></div>\n                </div>\n            </div>\n        </div>\n        <div class=\"bridge-gap-legend\">\n            <span class=\"bridge-gap-legend-item\"><span class=\"legend-swatch swatch-employee\"></span>Employee coverage</span>\n            <span class=\"bridge-gap-legend-item\"><span class=\"legend-swatch swatch-required\"></span>Job requirement</span>\n        </div>\n        <div class=\"bridge-insight\">Company-scoped and versioned &mdash; every customer gets their own evolving taxonomy</div>\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"3\">\n        <h4>Speaker Notes</h4>\n        So that mess from the last slide &mdash; cleaning up one person's skills is actually the easy part. What we built is a living taxonomy &mdash; a knowledge graph that grows smarter with every skill it processes. New hire comes in with unusual skills on their resume? They auto-canonize against what's already there through our API, with job title context for disambiguation. No redundancy, no manual mapping.\n\n        Here's the insight that makes this powerful: employees describe their skills in their own words &mdash; 'Python ML pipelines with Kubeflow.' But job profiles need standardized language &mdash; 'Machine Learning.' Our taxonomy links both through variant-to-canonical mappings. That's what makes real gap analysis possible &mdash; comparing a person's actual skills against a job's requirements even when they use completely different language.\n\n        And because every canonical carries structured labels, you're not limited to skill-by-skill comparison. You can ask: what's our digital readiness gap? Our AI readiness? Our cloud coverage? Any dimension you care about.\n\n        The engineering challenge behind this is massive &mdash; deduplicating across every employee and job profile in your organization, hundreds of thousands of skill mentions, while keeping the taxonomy company-scoped and versioned so you can track how your skill language evolves. That's what our canonizer was built to do.\n    </div>\n</div>\n", "slides/07-intelligence-engine.html": "<!-- Slide 5: A Self-Correcting Intelligence System -->\n<div class=\"slide slide-content\" data-slide=\"5\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">05</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Censia AI Engine</p>\n        <h2 class=\"slide-title-text\">A Self-Correcting Intelligence System</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Turning messy workforce language into shared meaning, trained on the observed evolution of roles and skills.</p>\n    </div>\n\n    <!-- Full slide layout: 3 zones stacked -->\n    <div class=\"ie-layout\">\n        <!-- Zone 1: 4-Signal Resolver -->\n        <div class=\"resolver-zone\">\n            <div class=\"resolver-input\">\n                <span class=\"resolver-input-q\">?</span>\n                <span class=\"resolver-input-skill\">\"Modeling\"</span>\n                <span class=\"resolver-input-ctx\">Financial Analyst @ Goldman Sachs</span>\n            </div>\n\n            <div class=\"resolver-flow\">\n                <div class=\"resolver-signals\">\n                    <div class=\"signal-card signal-card-teal\">\n                        <div class=\"signal-card-head\">\n                            <span class=\"signal-card-name\">Skill Sim.</span>\n                        </div>\n                        <div class=\"signal-card-detail\">Embedding distance to \"Financial Modeling\"</div>\n                    </div>\n                    <div class=\"signal-card signal-card-blue\">\n                        <div class=\"signal-card-head\">\n                            <span class=\"signal-card-name\">Title Ctx</span>\n                        </div>\n                        <div class=\"signal-card-detail\">\"Financial Analyst\" favors finance</div>\n                    </div>\n                    <div class=\"signal-card signal-card-purple\">\n                        <div class=\"signal-card-head\">\n                            <span class=\"signal-card-name\">Company</span>\n                        </div>\n                        <div class=\"signal-card-detail\">Goldman Sachs &rarr; financial domain</div>\n                    </div>\n                    <div class=\"signal-card signal-card-orange\">\n                        <div class=\"signal-card-head\">\n                            <span class=\"signal-card-name\">Co-Skills</span>\n                        </div>\n                        <div class=\"signal-card-detail\">Bloomberg Terminal, DCF, Valuation Modeling present</div>\n                    </div>\n                </div>\n\n                <div class=\"resolver-converge\">\n                    <svg class=\"converge-lines\" viewBox=\"0 0 400 24\" preserveAspectRatio=\"none\">\n                        <line x1=\"50\" y1=\"0\" x2=\"160\" y2=\"24\" stroke=\"var(--primary)\" stroke-width=\"1.5\" opacity=\"0.4\"/>\n                        <line x1=\"150\" y1=\"0\" x2=\"180\" y2=\"24\" stroke=\"var(--blue)\" stroke-width=\"1.2\" opacity=\"0.4\"/>\n                        <line x1=\"250\" y1=\"0\" x2=\"200\" y2=\"24\" stroke=\"var(--purple)\" stroke-width=\"0.8\" opacity=\"0.4\"/>\n                        <line x1=\"350\" y1=\"0\" x2=\"220\" y2=\"24\" stroke=\"var(--orange)\" stroke-width=\"0.8\" opacity=\"0.4\"/>\n                    </svg>\n                </div>\n\n                <div class=\"resolver-candidates\">\n                    <div class=\"candidate-pill candidate-winner\">\n                        <span class=\"candidate-check\">&#10003;</span>\n                        <span class=\"candidate-name\">Financial Modeling</span>\n                        <span class=\"candidate-conf\">HIGH</span>\n                    </div>\n                    <div class=\"candidate-pill candidate-faded\">\n                        <span class=\"candidate-name\">3D Modeling</span>\n                        <span class=\"candidate-conf\">LOW</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Zone 2+3: Cluster + Cycle side by side -->\n        <div class=\"ie-bottom\">\n            <!-- Polysemy Cluster Scatter -->\n            <div class=\"cluster-scatter\">\n                <div class=\"cluster-scatter-header\">\n                    <span class=\"cluster-scatter-label\">Polysemy Detection</span>\n                    <div class=\"cluster-scatter-title\">\"Automation\"</div>\n                </div>\n                <div class=\"cluster-field\" id=\"clusterField\">\n                    <!-- Axis labels -->\n                    <span class=\"cluster-axis cluster-axis-x\">Title embedding &rarr;</span>\n                    <span class=\"cluster-axis cluster-axis-y\">Skill co-occurrence &rarr;</span>\n                    <!-- Cluster A: Test Automation (teal) — left blob -->\n                    <div class=\"cluster-dot dot-teal dot-lg\" data-cluster=\"a\" data-tx=\"14\" data-ty=\"30\" style=\"left:44%;top:38%\"></div>\n                    <div class=\"cluster-dot dot-teal\" data-cluster=\"a\" data-tx=\"18\" data-ty=\"22\" style=\"left:48%;top:32%\"></div>\n                    <div class=\"cluster-dot dot-teal\" data-cluster=\"a\" data-tx=\"22\" data-ty=\"38\" style=\"left:42%;top:42%\"></div>\n                    <div class=\"cluster-dot dot-teal dot-sm\" data-cluster=\"a\" data-tx=\"10\" data-ty=\"44\" style=\"left:52%;top:36%\"></div>\n                    <div class=\"cluster-dot dot-teal\" data-cluster=\"a\" data-tx=\"26\" data-ty=\"28\" style=\"left:38%;top:48%\"></div>\n                    <div class=\"cluster-dot dot-teal dot-sm\" data-cluster=\"a\" data-tx=\"16\" data-ty=\"52\" style=\"left:46%;top:44%\"></div>\n                    <div class=\"cluster-dot dot-teal\" data-cluster=\"a\" data-tx=\"20\" data-ty=\"18\" style=\"left:50%;top:28%\"></div>\n                    <div class=\"cluster-dot dot-teal dot-lg\" data-cluster=\"a\" data-tx=\"12\" data-ty=\"36\" style=\"left:40%;top:52%\"></div>\n                    <div class=\"cluster-dot dot-teal dot-sm\" data-cluster=\"a\" data-tx=\"24\" data-ty=\"48\" style=\"left:36%;top:34%\"></div>\n                    <div class=\"cluster-dot dot-teal\" data-cluster=\"a\" data-tx=\"8\" data-ty=\"40\" style=\"left:54%;top:46%\"></div>\n                    <div class=\"cluster-dot dot-teal dot-sm\" data-cluster=\"a\" data-tx=\"19\" data-ty=\"56\" style=\"left:44%;top:56%\"></div>\n                    <div class=\"cluster-dot dot-teal\" data-cluster=\"a\" data-tx=\"28\" data-ty=\"34\" style=\"left:34%;top:40%\"></div>\n                    <!-- Cluster B: Marketing Automation (blue) — right blob -->\n                    <div class=\"cluster-dot dot-blue dot-lg\" data-cluster=\"b\" data-tx=\"74\" data-ty=\"32\" style=\"left:56%;top:40%\"></div>\n                    <div class=\"cluster-dot dot-blue\" data-cluster=\"b\" data-tx=\"78\" data-ty=\"24\" style=\"left:52%;top:34%\"></div>\n                    <div class=\"cluster-dot dot-blue\" data-cluster=\"b\" data-tx=\"70\" data-ty=\"40\" style=\"left:60%;top:46%\"></div>\n                    <div class=\"cluster-dot dot-blue dot-sm\" data-cluster=\"b\" data-tx=\"82\" data-ty=\"36\" style=\"left:48%;top:50%\"></div>\n                    <div class=\"cluster-dot dot-blue\" data-cluster=\"b\" data-tx=\"68\" data-ty=\"48\" style=\"left:58%;top:38%\"></div>\n                    <div class=\"cluster-dot dot-blue dot-sm\" data-cluster=\"b\" data-tx=\"76\" data-ty=\"52\" style=\"left:54%;top:52%\"></div>\n                    <div class=\"cluster-dot dot-blue\" data-cluster=\"b\" data-tx=\"84\" data-ty=\"28\" style=\"left:62%;top:30%\"></div>\n                    <div class=\"cluster-dot dot-blue dot-lg\" data-cluster=\"b\" data-tx=\"72\" data-ty=\"44\" style=\"left:50%;top:56%\"></div>\n                    <div class=\"cluster-dot dot-blue dot-sm\" data-cluster=\"b\" data-tx=\"80\" data-ty=\"20\" style=\"left:56%;top:26%\"></div>\n                    <div class=\"cluster-dot dot-blue\" data-cluster=\"b\" data-tx=\"66\" data-ty=\"56\" style=\"left:64%;top:44%\"></div>\n                    <div class=\"cluster-dot dot-blue dot-sm\" data-cluster=\"b\" data-tx=\"86\" data-ty=\"42\" style=\"left:46%;top:48%\"></div>\n                    <div class=\"cluster-dot dot-blue\" data-cluster=\"b\" data-tx=\"75\" data-ty=\"58\" style=\"left:58%;top:54%\"></div>\n                    <!-- Divider -->\n                    <div class=\"cluster-divider\" id=\"clusterDivider\"></div>\n                </div>\n                <div class=\"cluster-labels\">\n                    <div class=\"cluster-label cluster-label-a\">\n                        <strong>Test Automation</strong>\n                        <span>QA Engineers, SDETs</span>\n                    </div>\n                    <div class=\"cluster-label cluster-label-b\">\n                        <strong>Marketing Automation</strong>\n                        <span>Growth, Demand Gen</span>\n                    </div>\n                </div>\n                <div class=\"cluster-badge\">Statistical pre-filter + LLM quality gate validates every proposed split</div>\n            </div>\n\n            <!-- Self-Correction Cycle -->\n            <div class=\"correction-cycle\">\n                <div class=\"cycle-header\">Continuous Self-Correction</div>\n                <div class=\"cycle-ring\">\n                    <div class=\"cycle-step cycle-step-teal\">\n                        <div class=\"cycle-step-icon\">\n                            <svg viewBox=\"0 0 24 24\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n                        </div>\n                        <div class=\"cycle-step-text\">\n                            <strong>Detect</strong>\n                            <span>Mismatch agents scan for bad matches</span>\n                        </div>\n                    </div>\n                    <div class=\"cycle-arrow-down\">\n                        <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z\" fill=\"var(--gray-mid)\"/></svg>\n                    </div>\n                    <div class=\"cycle-step cycle-step-blue\">\n                        <div class=\"cycle-step-icon\">\n                            <svg viewBox=\"0 0 24 24\"><path d=\"M17 3H7c-1.1 0-1.99.9-1.99 2L5 21l7-3 7 3V5c0-1.1-.9-2-2-2z\"/></svg>\n                        </div>\n                        <div class=\"cycle-step-text\">\n                            <strong>Merge</strong>\n                            <span>Near-duplicates auto-merge at 97%+</span>\n                        </div>\n                    </div>\n                    <div class=\"cycle-arrow-down\">\n                        <svg viewBox=\"0 0 24 24\" width=\"18\" height=\"18\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z\" fill=\"var(--gray-mid)\"/></svg>\n                    </div>\n                    <div class=\"cycle-step cycle-step-orange\">\n                        <div class=\"cycle-step-icon\">\n                            <svg viewBox=\"0 0 24 24\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z\"/></svg>\n                        </div>\n                        <div class=\"cycle-step-text\">\n                            <strong>Enrich</strong>\n                            <span>New skills match existing canonicals first</span>\n                        </div>\n                    </div>\n                </div>\n                <div class=\"cycle-loop-label\">&#8635; runs until stable &middot; re-triggers on change</div>\n            </div>\n        </div>\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"5\">\n        <h4>Speaker Notes</h4>\n        That convergence you just saw &mdash; there's serious engineering behind it. Let me show you what's actually happening.\n\n        When we see 'Modeling' on a resume, we don't guess. We score four independent signals &mdash; skill embedding similarity, the person's job title, their company context, and what other skills they have &mdash; each weighted by reliability. For a Financial Analyst at Goldman Sachs whose other skills include Bloomberg Terminal and DCF analysis &mdash; that resolves to Financial Modeling with high confidence. A 3D Artist at Pixar with Maya and ZBrush? 3D Modeling. The signals converge.\n\n        But here's what really sets this apart: when a canonical skill has variants where the job title patterns genuinely disagree &mdash; like 'Automation' appearing on both QA engineers and marketing managers &mdash; we detect that statistically. We cluster the title embeddings, check the separation, and if it's real, propose a split. A language model validates the split before anything changes in the taxonomy. This handles polysemy at scale, automatically.\n\n        And the taxonomy heals itself. Agents continuously scan for mismatches and fix them. Near-duplicate canonicals get auto-merged. New skills always match against existing canonicals first &mdash; the system never creates redundancy.\n\n        This is why it's defensible. You need the data, the algorithms, and years of feedback loops to build something like this.\n    </div>\n</div>\n", "slides/08-proficiency.html": "<!-- Slide 6: Proficiency Intelligence -->\n<div class=\"slide slide-content\" data-slide=\"6\">\n  <div class=\"slide-header\">\n    <div class=\"slide-number\">06</div>\n    <p\n      style=\"\n        color: var(--primary);\n        font-size: 13px;\n        font-weight: 700;\n        text-transform: uppercase;\n        letter-spacing: 3px;\n        margin-bottom: 8px;\n      \"\n    >\n      Censia AI Engine\n    </p>\n    <h2 class=\"slide-title-text\">\n      Proficiency: Vector-Enabled Mathematical Model\n    </h2>\n    <p\n      style=\"\n        color: rgba(0, 0, 0, 0.55);\n        font-size: 19px;\n        font-weight: 400;\n        margin-top: 8px;\n        line-height: 1.5;\n      \"\n    >\n      Vector-based scoring that estimates real capability from multiple signals,\n      not self-reported checkmarks.\n    </p>\n  </div>\n  <div class=\"proficiency-grid\" style=\"gap: 28px\">\n    <!-- Left: The Model -->\n    <div class=\"proficiency-model\">\n      <div class=\"index-cards\" style=\"gap: 8px\">\n        <div class=\"index-card\" style=\"--delay: 0s; padding: 10px 14px\">\n          <div\n            class=\"index-letter\"\n            style=\"background: rgba(0, 182, 161, 0.15); color: var(--primary)\"\n          >\n            R\n          </div>\n          <div class=\"index-info\">\n            <h3>Recency</h3>\n            <p>\n              Exponential decay &mdash; skills fade over time unless actively\n              used\n            </p>\n            <svg\n              class=\"index-curve\"\n              viewBox=\"0 0 80 32\"\n              preserveAspectRatio=\"none\"\n            >\n              <rect\n                class=\"curve-zone-warn\"\n                x=\"56\"\n                y=\"0\"\n                width=\"24\"\n                height=\"32\"\n                fill=\"rgba(228,71,71,0.08)\"\n                rx=\"2\"\n              />\n              <path\n                d=\"M 0 4 C 8 4 16 6 24 10 C 36 16 52 24 72 29 L 80 30\"\n                stroke=\"var(--primary)\"\n                stroke-width=\"2\"\n                fill=\"none\"\n                stroke-linecap=\"round\"\n              />\n            </svg>\n          </div>\n        </div>\n        <div class=\"index-card\" style=\"--delay: 0.15s; padding: 10px 14px\">\n          <div\n            class=\"index-letter\"\n            style=\"background: rgba(59, 148, 220, 0.15); color: var(--blue)\"\n          >\n            M\n          </div>\n          <div class=\"index-info\">\n            <h3>Maturity</h3>\n            <p>\n              Saturation curve &mdash; rapid growth early, diminishing returns\n              over time\n            </p>\n            <svg\n              class=\"index-curve\"\n              viewBox=\"0 0 80 32\"\n              preserveAspectRatio=\"none\"\n            >\n              <path\n                d=\"M 0 30 C 12 14 24 8 40 6 C 52 5 66 4.5 80 4\"\n                stroke=\"var(--blue)\"\n                stroke-width=\"2\"\n                fill=\"none\"\n                stroke-linecap=\"round\"\n              />\n            </svg>\n          </div>\n        </div>\n        <div class=\"index-card\" style=\"--delay: 0.3s; padding: 10px 14px\">\n          <div\n            class=\"index-letter\"\n            style=\"background: rgba(104, 97, 226, 0.15); color: var(--purple)\"\n          >\n            D\n          </div>\n          <div class=\"index-info\">\n            <h3>Depth</h3>\n            <p>\n              Cumulative aligned tenure across every relevant role in a career\n              &mdash; augmented by vector-space similarity to capture adjacent\n              skill proximity\n            </p>\n            <svg\n              class=\"index-curve\"\n              viewBox=\"0 0 80 32\"\n              preserveAspectRatio=\"none\"\n            >\n              <path\n                d=\"M 0 30 C 16 18 32 10 48 7 C 60 5.5 72 5 80 4.5\"\n                stroke=\"var(--purple)\"\n                stroke-width=\"2\"\n                fill=\"none\"\n                stroke-linecap=\"round\"\n              />\n            </svg>\n          </div>\n        </div>\n      </div>\n\n      <!-- Equation weighting visual -->\n      <div class=\"equation-visual\">\n        <div class=\"equation-weights\">\n          <div class=\"eq-segment eq-segment-r\"><span>R</span></div>\n          <div class=\"eq-segment eq-segment-m\"><span>M</span></div>\n          <div class=\"eq-segment eq-segment-d\"><span>D</span></div>\n        </div>\n        <div class=\"equation-label\">\n          <span class=\"eq-arrow\">&rarr;</span>\n          <span class=\"eq-score\">Proficiency 1&ndash;5</span>\n        </div>\n      </div>\n\n      <!-- Feature callouts -->\n      <div class=\"proficiency-callouts\">\n        <div class=\"prof-callout prof-callout-staleness\">\n          <div class=\"prof-callout-head\">\n            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--error)\">\n              <path d=\"M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z\" />\n            </svg>\n            <strong>Staleness Penalty</strong>\n          </div>\n          <span\n            >Dormant skills face continuous down-weighting &mdash; not a cliff,\n            a calibrated curve</span\n          >\n        </div>\n        <div class=\"prof-callout prof-callout-multi\">\n          <div class=\"prof-callout-head\">\n            <svg\n              width=\"14\"\n              height=\"14\"\n              viewBox=\"0 0 24 24\"\n              fill=\"var(--orange)\"\n            >\n              <path\n                d=\"M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z\"\n              />\n            </svg>\n            <strong>Multi-Role Aware</strong>\n          </div>\n          <span\n            >Current expertise isn&rsquo;t dragged down by older roles &mdash;\n            max-blend approach across career</span\n          >\n        </div>\n      </div>\n    </div>\n\n    <!-- Right: Distribution + Signals -->\n    <div class=\"proficiency-right\">\n      <div class=\"proficiency-distribution\" style=\"padding: 16px\">\n        <div class=\"distribution-header\">\n          <h3>Machine Learning &mdash; Data Science Team</h3>\n        </div>\n        <div class=\"distribution-bars\">\n          <div class=\"dist-row\">\n            <div class=\"dist-level\">\n              <span class=\"level-number\">5</span>\n              <span class=\"level-name\">Expert</span>\n            </div>\n            <div class=\"dist-bar-container\">\n              <div\n                class=\"dist-bar-fill\"\n                data-width=\"12\"\n                style=\"\n                  width: 0%;\n                  background: linear-gradient(90deg, #00b6a1, #0a7571);\n                \"\n              ></div>\n            </div>\n          </div>\n          <div class=\"dist-row\">\n            <div class=\"dist-level\">\n              <span class=\"level-number\">4</span>\n              <span class=\"level-name\">Advanced</span>\n            </div>\n            <div class=\"dist-bar-container\">\n              <div\n                class=\"dist-bar-fill\"\n                data-width=\"31\"\n                style=\"\n                  width: 0%;\n                  background: linear-gradient(90deg, #00b6a1, #0a9b8a);\n                \"\n              ></div>\n            </div>\n          </div>\n          <div class=\"dist-row\">\n            <div class=\"dist-level\">\n              <span class=\"level-number\">3</span>\n              <span class=\"level-name\">Intermediate</span>\n            </div>\n            <div class=\"dist-bar-container\">\n              <div\n                class=\"dist-bar-fill\"\n                data-width=\"38\"\n                style=\"\n                  width: 0%;\n                  background: linear-gradient(90deg, #00c4ae, #00b6a1);\n                \"\n              ></div>\n            </div>\n          </div>\n          <div class=\"dist-row\">\n            <div class=\"dist-level\">\n              <span class=\"level-number\">2</span>\n              <span class=\"level-name\">Basic</span>\n            </div>\n            <div class=\"dist-bar-container\">\n              <div\n                class=\"dist-bar-fill\"\n                data-width=\"15\"\n                style=\"\n                  width: 0%;\n                  background: linear-gradient(90deg, #3b94dc, #2d7bc0);\n                \"\n              ></div>\n            </div>\n          </div>\n          <div class=\"dist-row\">\n            <div class=\"dist-level\">\n              <span class=\"level-number\">1</span>\n              <span class=\"level-name\">Novice</span>\n            </div>\n            <div class=\"dist-bar-container\">\n              <div\n                class=\"dist-bar-fill\"\n                data-width=\"4\"\n                style=\"\n                  width: 0%;\n                  background: linear-gradient(90deg, #6861e2, #5a54c8);\n                \"\n              ></div>\n            </div>\n          </div>\n        </div>\n        <div class=\"distribution-avg\">\n          <span class=\"avg-label\">Team Average</span>\n          <span class=\"avg-value\">3.2</span>\n        </div>\n        <div class=\"distribution-note\">\n          Distributions at any level &mdash; individual, team, department,\n          organization\n        </div>\n      </div>\n\n      <!-- LMS Signal Exploration -->\n      <div class=\"lms-callout\">\n        <div class=\"lms-badge\">EXPLORING</div>\n        <div class=\"lms-content\">\n          <strong>Learning Signal Integration</strong>\n          <span\n            >Incorporating LMS completion data as a proficiency boost &mdash;\n            weighted to reward serious training without over-inflating\n            scores</span\n          >\n        </div>\n      </div>\n\n      <div class=\"proficiency-footnote\">\n        Configurable weights, half-lives, and staleness curves per customer\n      </div>\n    </div>\n  </div>\n  <div class=\"speaker-notes\" data-notes=\"6\">\n    <h4>Speaker Notes</h4>\n    This is where it gets powerful. We don't guess at proficiency &mdash; we\n    model it mathematically. Three indices &mdash; Recency, Maturity, and Depth\n    &mdash; each follow their own mathematical curve. Recency uses exponential\n    decay: a skill you used last month scores high, one from three years ago\n    fades. Maturity follows a saturation curve: your first year of experience\n    matters most, then diminishing returns. Depth accumulates across your entire\n    career, weighted by how central the skill was to each role. These aren't\n    just added together &mdash; they're weighted and combined with a staleness\n    penalty that continuously down-weights dormant skills. And we're multi-role\n    aware: if you're actively using Python today, your score doesn't get dragged\n    down because you also used it in a junior role eight years ago. We use a\n    max-blend approach that favors your best recent evidence. The result: a\n    defensible 1-to-5 proficiency score for every skill on every person. And we\n    can show distributions at any level. We're also exploring LMS integration\n    &mdash; giving a calibrated boost when someone completes serious training,\n    without letting a quick online course inflate their score. Every parameter\n    is tunable per customer &mdash; weights, half-lives, thresholds, staleness\n    curves. We can recalculate instantly with different settings.\n  </div>\n</div>\n", "slides/09-title-recommender.html": "<!-- Slide: Title Intelligence — Recommender Workflows -->\n<div class=\"slide slide-content\" data-slide=\"0\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">00</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Censia AI Engine</p>\n        <h2 class=\"slide-title-text\">Title Intelligence: From Noise to Precision</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 16px; font-weight: 400; margin-top: 6px; line-height: 1.5;\">Disambiguation + ontology mapping across millions of variations, creating the foundation for reliable skills inference and matching at scale.</p>\n    </div>\n    <div class=\"tr-layout\" style=\"gap: 24px; overflow: hidden;\">\n        <!-- Left: The Pipeline -->\n        <div class=\"tr-left\">\n            <!-- Step 1: Input -->\n            <div class=\"tr-step-card tr-step-input\" style=\"padding: 12px 14px;\">\n                <div class=\"tr-step-badge\" style=\"background: var(--primary); color: white;\">1</div>\n                <div class=\"tr-step-content\">\n                    <h4>Raw Title Input</h4>\n                    <div class=\"tr-input-titles\">\n                        <span class=\"tr-input-tag\">Sr. Mgr, Data &amp; Analytics</span>\n                        <span class=\"tr-input-tag\">Head of BI</span>\n                        <span class=\"tr-input-tag\">Data Science Lead</span>\n                        <span class=\"tr-input-tag\">Analytics Dir.</span>\n                        <span class=\"tr-input-tag\">VP, Insights &amp; Analytics</span>\n                        <span class=\"tr-input-tag tr-input-tag-faded\">Manager II — DA</span>\n                    </div>\n                    <p class=\"tr-step-note\">Every company uses different naming conventions, abbreviations, internal codes. The same capability lives under dozens of strings.</p>\n                </div>\n            </div>\n\n            <!-- Arrow -->\n            <div class=\"tr-flow-arrow\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z\"/></svg>\n            </div>\n\n            <!-- Step 2: Proprietary Resolution Engine -->\n            <div class=\"tr-step-card tr-step-engine\" style=\"padding: 12px 14px;\">\n                <div class=\"tr-step-badge\" style=\"background: var(--blue); color: white;\">2</div>\n                <div class=\"tr-step-content\">\n                    <h4>Proprietary Resolution Engine</h4>\n                    <div class=\"tr-dual-models\">\n                        <div class=\"tr-model-box\" style=\"padding: 8px;\">\n                            <div class=\"tr-model-icon\" style=\"border-color: rgba(0, 182, 161, 0.4);\">\n                                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z\"/></svg>\n                            </div>\n                            <div class=\"tr-model-label\">Pattern Recognition</div>\n                            <div class=\"tr-model-desc\">Identifies recurring title patterns, co-occurrence signals, and organizational context at scale.</div>\n                        </div>\n                        <div class=\"tr-model-connector\">\n                            <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"var(--gray-mid)\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"/></svg>\n                            <span>Fused</span>\n                        </div>\n                        <div class=\"tr-model-box\" style=\"padding: 8px;\">\n                            <div class=\"tr-model-icon\" style=\"border-color: rgba(104, 97, 226, 0.4);\">\n                                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"var(--purple)\"><path d=\"M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z\"/></svg>\n                            </div>\n                            <div class=\"tr-model-label\">Semantic Parsing</div>\n                            <div class=\"tr-model-desc\">Interprets ambiguous titles, internal codes, and novel naming conventions using proprietary linguistic analysis.</div>\n                        </div>\n                    </div>\n                    <p class=\"tr-step-note\">Neither layer alone is sufficient. Pattern recognition brings data-driven precision; semantic parsing brings linguistic flexibility. Together they handle everything from standard titles to internal codes.</p>\n                </div>\n            </div>\n\n            <!-- Arrow -->\n            <div class=\"tr-flow-arrow\">\n                <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z\"/></svg>\n            </div>\n\n            <!-- Step 3: Refinement -->\n            <div class=\"tr-step-card tr-step-refine\" style=\"padding: 12px 14px;\">\n                <div class=\"tr-step-badge\" style=\"background: var(--orange); color: white;\">3</div>\n                <div class=\"tr-step-content\">\n                    <h4>Contextual Refinement</h4>\n                    <div class=\"tr-refine-dimensions\">\n                        <div class=\"tr-refine-dim\">\n                            <div class=\"tr-refine-icon\" style=\"background: rgba(0, 182, 161, 0.08);\">\n                                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"/></svg>\n                            </div>\n                            <div>\n                                <strong>Seniority</strong>\n                                <span>IC &rarr; Lead &rarr; Manager &rarr; Director &rarr; VP &rarr; C-Suite</span>\n                            </div>\n                        </div>\n                        <div class=\"tr-refine-dim\">\n                            <div class=\"tr-refine-icon\" style=\"background: rgba(59, 148, 220, 0.08);\">\n                                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--blue)\"><path d=\"M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z\"/></svg>\n                            </div>\n                            <div>\n                                <strong>Organizational Function</strong>\n                                <span>Engineering, Finance, Operations, Marketing, HR&hellip;</span>\n                            </div>\n                        </div>\n                        <div class=\"tr-refine-dim\">\n                            <div class=\"tr-refine-icon\" style=\"background: rgba(104, 97, 226, 0.08);\">\n                                <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--purple)\"><path d=\"M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z\"/></svg>\n                            </div>\n                            <div>\n                                <strong>Industry Context</strong>\n                                <span>Same title means different things in different industries</span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Right: Output + Insight -->\n        <div class=\"tr-right\" style=\"gap: 10px;\">\n            <!-- Final output -->\n            <div class=\"tr-output-card\" style=\"padding: 14px 16px;\">\n                <div class=\"tr-step-badge\" style=\"background: var(--primary-dark); color: white;\">4</div>\n                <div class=\"tr-output-header\">\n                    <h4>Standardized Output</h4>\n                    <div class=\"tr-output-badge\">Mapped to Censia Ontology</div>\n                </div>\n                <div class=\"tr-output-result\">\n                    <div class=\"tr-output-row\" style=\"padding: 6px 10px;\">\n                        <div class=\"tr-output-original\">Sr. Mgr, Data &amp; Analytics</div>\n                        <div class=\"tr-output-arrow\">&rarr;</div>\n                        <div class=\"tr-output-standard\">\n                            <div class=\"tr-standard-title\">Senior Manager, Data Analytics</div>\n                            <div class=\"tr-standard-meta\">\n                                <span class=\"tr-meta-tag\" style=\"background: rgba(0, 182, 161, 0.1); color: var(--primary-dark);\">Manager</span>\n                                <span class=\"tr-meta-tag\" style=\"background: rgba(59, 148, 220, 0.1); color: var(--blue);\">Analytics</span>\n                            </div>\n                        </div>\n                    </div>\n                    <div class=\"tr-output-row\" style=\"padding: 6px 10px;\">\n                        <div class=\"tr-output-original\">Head of BI</div>\n                        <div class=\"tr-output-arrow\">&rarr;</div>\n                        <div class=\"tr-output-standard\">\n                            <div class=\"tr-standard-title\">Director, Business Intelligence</div>\n                            <div class=\"tr-standard-meta\">\n                                <span class=\"tr-meta-tag\" style=\"background: rgba(0, 182, 161, 0.1); color: var(--primary-dark);\">Director</span>\n                                <span class=\"tr-meta-tag\" style=\"background: rgba(59, 148, 220, 0.1); color: var(--blue);\">Analytics</span>\n                            </div>\n                        </div>\n                    </div>\n                    <div class=\"tr-output-row\" style=\"padding: 6px 10px;\">\n                        <div class=\"tr-output-original\">Manager II — DA</div>\n                        <di
