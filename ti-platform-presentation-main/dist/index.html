v class=\"tr-output-arrow\">&rarr;</div>\n                        <div class=\"tr-output-standard\">\n                            <div class=\"tr-standard-title\">Manager, Data Analytics</div>\n                            <div class=\"tr-standard-meta\">\n                                <span class=\"tr-meta-tag\" style=\"background: rgba(0, 182, 161, 0.1); color: var(--primary-dark);\">Manager</span>\n                                <span class=\"tr-meta-tag\" style=\"background: rgba(59, 148, 220, 0.1); color: var(--blue);\">Analytics</span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n                <div class=\"tr-output-note\">\n                    Every title resolves to a canonical form in the Censia ontology &mdash; with seniority, function, and archetype attached. This is what the rest of the platform searches, compares, and builds pathways on.\n                </div>\n            </div>\n\n            <!-- Why this is hard / competitive advantage -->\n            <div class=\"tr-advantage-card\" style=\"padding: 14px 16px;\">\n                <h5>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary-dark)\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z\"/></svg>\n                    Why This Is Hard to Replicate\n                </h5>\n                <div class=\"tr-advantage-points\">\n                    <div class=\"tr-adv-point\">\n                        <div class=\"tr-adv-bullet\" style=\"background: var(--primary);\"></div>\n                        <div>The pattern engine draws on <strong>extensive real-world data</strong> &mdash; it knows that \"Manager II — DA\" at one company maps to \"Manager, Data Analytics\" because it's observed the pattern across thousands of organizations.</div>\n                    </div>\n                    <div class=\"tr-adv-point\">\n                        <div class=\"tr-adv-bullet\" style=\"background: var(--purple);\"></div>\n                        <div>The semantic parser handles <strong>novel titles</strong> and internal codes that have never appeared in training data &mdash; but the pattern engine validates and constrains those suggestions against the real-world distribution.</div>\n                    </div>\n                    <div class=\"tr-adv-point\">\n                        <div class=\"tr-adv-bullet\" style=\"background: var(--orange);\"></div>\n                        <div>Standardization isn't just string normalization. It's <strong>semantic resolution</strong> &mdash; decomposing a title into seniority, function, and domain, then mapping it to a position in our ontology that connects to skills, proficiency, and career trajectories.</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"0\">\n        <h4>Speaker Notes</h4>\n        Let me show you something that looks simple but is actually one of the hardest problems in talent intelligence — title standardization. Every company invents its own naming conventions. \"Sr. Mgr, Data and Analytics,\" \"Head of BI,\" \"Manager II — DA\" — these are all variations of similar roles, but no two companies express them the same way. Here's how we solve it. First, we take the raw titles as input. Then we run them through our proprietary resolution engine. The pattern recognition layer — trained on millions of real profiles — catches the patterns it's seen before. The semantic parsing layer handles the novel cases — internal codes, creative naming, abbreviations it hasn't encountered. These two layers are fused, not competing. Pattern recognition brings data-driven precision; semantic parsing brings linguistic flexibility. Next, we refine using context — seniority, organizational function, industry. \"Head of BI\" in finance vs. tech means different things. Finally, every title resolves to a canonical form in our ontology, with seniority, function, and archetype attached. This is what flows into everything else — the skills taxonomy, the proficiency model, the career pathways, the search engine. If your title layer is messy, everything downstream breaks. Ours isn't.\n    </div>\n</div>\n", "slides/10-attribute-graph.html": "<!-- Slide: The Attribute Intelligence Graph -->\n<div class=\"slide slide-content\" data-slide=\"0\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">00</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 6px;\">Censia AI Engine</p>\n        <h2 class=\"slide-title-text\">The Attribute Intelligence Graph</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 14px; font-weight: 400; margin-top: 4px; line-height: 1.4;\">A computed graph where edge weights encode real co-occurrence strength. It's the retrieval backbone agents need for reliable matching and next-step recommendations.</p>\n    </div>\n    <div class=\"ag-layout\" style=\"gap: 18px; overflow: hidden;\">\n        <!-- Left: The Graph Concept -->\n        <div class=\"ag-left\" style=\"gap: 8px; min-height: 0; overflow: hidden;\">\n            <div class=\"ag-graph-card\" style=\"padding: 10px 14px;\">\n                <h4>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z\"/></svg>\n                    Weighted Relationship Graph\n                </h4>\n                <!-- Visual: Node-link graph diagram -->\n                <div class=\"ag-graph-visual\" style=\"height: 120px; margin-bottom: 4px;\">\n                    <!-- Central hub -->\n                    <div class=\"ag-node ag-node-center\">\n                        <div class=\"ag-node-dot\" style=\"background: var(--primary); width: 44px; height: 44px; box-shadow: 0 0 24px rgba(0, 182, 161, 0.4);\">\n                            <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93z\"/></svg>\n                        </div>\n                        <span class=\"ag-node-label\">Data Scientist</span>\n                    </div>\n                    <!-- Connected nodes arranged around center -->\n                    <div class=\"ag-connections\">\n                        <div class=\"ag-connection ag-conn-tl\">\n                            <div class=\"ag-edge\" style=\"--edge-color: var(--primary);\"><span class=\"ag-edge-weight\">0.91</span></div>\n                            <div class=\"ag-node-sm\">\n                                <div class=\"ag-node-dot-sm\" style=\"background: var(--blue);\">\n                                    <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z\"/></svg>\n                                </div>\n                                <span>Python</span>\n                            </div>\n                        </div>\n                        <div class=\"ag-connection ag-conn-tr\">\n                            <div class=\"ag-edge\" style=\"--edge-color: var(--primary);\"><span class=\"ag-edge-weight\">0.87</span></div>\n                            <div class=\"ag-node-sm\">\n                                <div class=\"ag-node-dot-sm\" style=\"background: var(--blue);\">\n                                    <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z\"/></svg>\n                                </div>\n                                <span>Machine Learning</span>\n                            </div>\n                        </div>\n                        <div class=\"ag-connection ag-conn-ml\">\n                            <div class=\"ag-edge\" style=\"--edge-color: var(--orange);\"><span class=\"ag-edge-weight\">0.74</span></div>\n                            <div class=\"ag-node-sm\">\n                                <div class=\"ag-node-dot-sm\" style=\"background: var(--purple);\">\n                                    <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"/></svg>\n                                </div>\n                                <span>ML Engineer</span>\n                            </div>\n                        </div>\n                        <div class=\"ag-connection ag-conn-mr\">\n                            <div class=\"ag-edge\" style=\"--edge-color: var(--orange);\"><span class=\"ag-edge-weight\">0.69</span></div>\n                            <div class=\"ag-node-sm\">\n                                <div class=\"ag-node-dot-sm\" style=\"background: var(--purple);\">\n                                    <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"/></svg>\n                                </div>\n                                <span>Research Scientist</span>\n                            </div>\n                        </div>\n                        <div class=\"ag-connection ag-conn-bl\">\n                            <div class=\"ag-edge\" style=\"--edge-color: var(--blue);\"><span class=\"ag-edge-weight\">0.82</span></div>\n                            <div class=\"ag-node-sm\">\n                                <div class=\"ag-node-dot-sm\" style=\"background: var(--blue);\">\n                                    <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z\"/></svg>\n                                </div>\n                                <span>Statistics</span>\n                            </div>\n                        </div>\n                        <div class=\"ag-connection ag-conn-br\">\n                            <div class=\"ag-edge\" style=\"--edge-color: rgba(104, 97, 226, 0.6);\"><span class=\"ag-edge-weight\">0.58</span></div>\n                            <div class=\"ag-node-sm\">\n                                <div class=\"ag-node-dot-sm\" style=\"background: var(--gray-dark);\">\n                                    <svg width=\"10\" height=\"10\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2z\"/></svg>\n                                </div>\n                                <span>Technology</span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n                <div class=\"ag-graph-caption\" style=\"padding-top: 4px; font-size: 10px; line-height: 1.3;\">\n                    Every edge is <strong>weighted by co-occurrence strength</strong> across millions of profiles. Thicker edges = stronger association.\n                </div>\n            </div>\n            <!-- What the graph connects -->\n            <div class=\"ag-connects-card\" style=\"padding: 8px 12px;\">\n                <h4>Attribute Dimensions Connected</h4>\n                <div class=\"ag-connect-grid\">\n                    <div class=\"ag-connect-item\" style=\"padding: 4px 8px;\">\n                        <div class=\"ag-connect-icon\" style=\"background: rgba(0, 182, 161, 0.08);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z\"/></svg>\n                        </div>\n                        <div>\n                            <strong>Skills &harr; Skills</strong>\n                            <span>Co-occurrence patterns, substitutability</span>\n                        </div>\n                    </div>\n                    <div class=\"ag-connect-item\" style=\"padding: 4px 8px;\">\n                        <div class=\"ag-connect-icon\" style=\"background: rgba(104, 97, 226, 0.08);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--purple)\"><path d=\"M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3z\"/></svg>\n                        </div>\n                        <div>\n                            <strong>Titles &harr; Skills</strong>\n                            <span>Which skills define which roles</span>\n                        </div>\n                    </div>\n                    <div class=\"ag-connect-item\" style=\"padding: 4px 8px;\">\n                        <div class=\"ag-connect-icon\" style=\"background: rgba(59, 148, 220, 0.08);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--blue)\"><path d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"/></svg>\n                        </div>\n                        <div>\n                            <strong>Titles &harr; Titles</strong>\n                            <span>Career adjacency, role equivalence</span>\n                        </div>\n                    </div>\n                    <div class=\"ag-connect-item\" style=\"padding: 4px 8px;\">\n                        <div class=\"ag-connect-icon\" style=\"background: rgba(255, 150, 48, 0.08);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--orange)\"><path d=\"M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2z\"/></svg>\n                        </div>\n                        <div>\n                            <strong>Skills &harr; Industries</strong>\n                            <span>Sector-specific skill demand signals</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Right: How it works + examples -->\n        <div class=\"ag-right\" style=\"gap: 6px; min-height: 0; overflow: hidden;\">\n            <!-- How it works -->\n            <div class=\"ag-how-card\" style=\"padding: 8px 12px;\">\n                <h4>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z\"/></svg>\n                    How It Works\n                </h4>\n                <div class=\"ag-how-steps\" style=\"gap: 5px;\">\n                    <div class=\"ag-how-step\">\n                        <div class=\"ag-how-num\" style=\"background: var(--primary); color: white;\">1</div>\n                        <div>\n                            <strong>Custom Aggregation</strong>\n                            <p style=\"font-size: 12px; line-height: 1.35; margin: 0;\">Billions of co-occurrence signals distilled into weighted edges across every attribute pair.</p>\n                        </div>\n                    </div>\n                    <div class=\"ag-how-step\">\n                        <div class=\"ag-how-num\" style=\"background: var(--blue); color: white;\">2</div>\n                        <div>\n                            <strong>Graph Traversal</strong>\n                            <p style=\"font-size: 12px; line-height: 1.35; margin: 0;\">Multi-hop paths reveal relationships invisible to direct keyword lookup.</p>\n                        </div>\n                    </div>\n                    <div class=\"ag-how-step\">\n                        <div class=\"ag-how-num\" style=\"background: var(--purple); color: white;\">3</div>\n                        <div>\n                            <strong>Weighted Recommendations</strong>\n                            <p style=\"font-size: 12px; line-height: 1.35; margin: 0;\">Edge weights drive confidence-ranked suggestions. Weak edges pruned automatically.</p>\n                        </div>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Live example: Deep connection discovery -->\n            <div class=\"ag-example-card\" style=\"padding: 8px 12px;\">\n                <h4>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--orange)\"><path d=\"M7 2v11h3v9l7-12h-4l4-8z\"/></svg>\n                    Deep Connection Discovery\n                </h4>\n                <div class=\"ag-example-scenario\">\n                    <div class=\"ag-example-query\">\n                        <span class=\"ag-example-label\">Input</span>\n                        <span class=\"ag-example-value\">\"Product Analyst\" in Fintech</span>\n                    </div>\n                    <div class=\"ag-example-arrow\">\n                        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z\"/></svg>\n                    </div>\n                    <div class=\"ag-example-results\">\n                        <div class=\"ag-example-result\" style=\"padding: 5px 8px;\">\n                            <div class=\"ag-example-hop\">\n                                <span class=\"ag-hop-badge\" style=\"background: var(--primary); color: white;\">1-hop</span>\n                            </div>\n                            <div class=\"ag-example-result-text\">\n                                <strong>SQL, A/B Testing, Python</strong>\n                                <span>Direct skill associations &mdash; highest weight</span>\n                            </div>\n                        </div>\n                        <div class=\"ag-example-result\" style=\"padding: 5px 8px;\">\n                            <div class=\"ag-example-hop\">\n                                <span class=\"ag-hop-badge\" style=\"background: var(--blue); color: white;\">2-hop</span>\n                            </div>\n                            <div class=\"ag-example-result-text\">\n                                <strong>Growth Analyst, Data Analyst, BI Analyst</strong>\n                                <span>Adjacent titles sharing skill signatures</span>\n                            </div>\n                        </div>\n                        <div class=\"ag-example-result\" style=\"padding: 5px 8px;\">\n                            <div class=\"ag-example-hop\">\n                                <span class=\"ag-hop-badge\" style=\"background: var(--purple); color: white;\">3-hop</span>\n                            </div>\n                            <div class=\"ag-example-result-text\">\n                                <strong>Fintech &rarr; Payments &rarr; Risk Analytics</strong>\n                                <span>Industry-specific path reveals non-obvious lateral move</span>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n            </div>\n\n            <!-- What this powers callout -->\n            <div class=\"ag-powers-callout\" style=\"padding: 7px 12px;\">\n                <h5 style=\"margin-bottom: 6px;\">\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary-dark)\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"/></svg>\n                    What This Powers\n                </h5>\n                <div class=\"ag-powers-list\">\n                    <span class=\"ag-power-tag\" style=\"background: rgba(0, 182, 161, 0.08); color: var(--primary-dark);\">Title Recommendations</span>\n                    <span class=\"ag-power-tag\" style=\"background: rgba(59, 148, 220, 0.08); color: var(--blue);\">Skill Inference</span>\n                    <span class=\"ag-power-tag\" style=\"background: rgba(104, 97, 226, 0.08); color: var(--purple);\">Career Pathways</span>\n                    <span class=\"ag-power-tag\" style=\"background: rgba(255, 150, 48, 0.08); color: #B86E1B;\">Gap Analysis</span>\n                    <span class=\"ag-power-tag\" style=\"background: rgba(184, 42, 147, 0.08); color: var(--magenta);\">Search Ranking</span>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"0\">\n        <h4>Speaker Notes</h4>\n        Now I want to show you what's underneath all of these capabilities &mdash; the infrastructure that makes recommendations, pathways, and search possible. We build a weighted relationship graph through custom aggregations across our entire dataset. Not a theoretical model &mdash; a computed graph where every edge represents real co-occurrence strength across millions of profiles. The graph connects every attribute dimension to every other dimension. Skills to skills &mdash; we know that Python and Machine Learning co-occur with a weight of 0.91, meaning they almost always appear together. But it goes deeper. Titles to skills &mdash; we know which skills statistically define each role. Titles to titles &mdash; we know which roles are adjacent and which career transitions are common. Skills to industries &mdash; we know how skill demand varies by sector. The power is in multi-hop traversal. When you ask about a \"Product Analyst in Fintech,\" the first hop gives you the direct skills: SQL, A/B Testing, Python. The second hop reveals adjacent titles that share those skill signatures: Growth Analyst, BI Analyst. The third hop follows the industry edges and surfaces something no keyword search would ever find: that Risk Analytics in Payments is a viable lateral path with a surprising skill overlap. This graph is what powers everything. Title recommendations, skill inference, career pathways, gap analysis, search ranking &mdash; they all traverse these weighted edges. And because the graph is built from our proprietary dataset, it can't be replicated with generic data.\n    </div>\n</div>\n", "slides/11-graph-recommender.html": "<!-- Slide: Graph-Powered Recommenders -->\n<div class=\"slide slide-content\" data-slide=\"0\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">00</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">Censia AI Engine</p>\n        <h2 class=\"slide-title-text\">Graph-Powered Recommenders</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Better recommendations come from better structure. We built the signal graph, then used multi-hop traversal to turn it into prioritized next steps.</p>\n    </div>\n    <div class=\"gr-layout\">\n        <!-- Left: The Concept -->\n        <div class=\"gr-left\">\n            <!-- Core idea card -->\n            <div class=\"gr-concept-card\">\n                <h4>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M7 2v11h3v9l7-12h-4l4-8z\"/></svg>\n                    From Graph to Recommendation\n                </h4>\n                <p class=\"gr-concept-desc\">\n                    The weighted relationship graph doesn't just describe connections &mdash; it <strong>generates recommendations</strong>. By traversing weighted edges and aggregating signal strength across paths, the system surfaces relationships that no lookup table or keyword index can find.\n                </p>\n                <div class=\"gr-concept-flow\">\n                    <div class=\"gr-flow-node gr-flow-input\">\n                        <div class=\"gr-flow-dot\" style=\"background: var(--blue);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"/></svg>\n                        </div>\n                        <span>Input Query</span>\n                    </div>\n                    <div class=\"gr-flow-edge\">\n                        <svg width=\"40\" height=\"12\" viewBox=\"0 0 40 12\"><line x1=\"0\" y1=\"6\" x2=\"32\" y2=\"6\" stroke=\"var(--gray-mid)\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/><polygon points=\"32,1 40,6 32,11\" fill=\"var(--primary)\"/></svg>\n                    </div>\n                    <div class=\"gr-flow-node gr-flow-graph\">\n                        <div class=\"gr-flow-dot\" style=\"background: var(--primary); box-shadow: 0 0 16px rgba(0, 182, 161, 0.4);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z\"/></svg>\n                        </div>\n                        <span>Graph Traversal</span>\n                    </div>\n                    <div class=\"gr-flow-edge\">\n                        <svg width=\"40\" height=\"12\" viewBox=\"0 0 40 12\"><line x1=\"0\" y1=\"6\" x2=\"32\" y2=\"6\" stroke=\"var(--gray-mid)\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/><polygon points=\"32,1 40,6 32,11\" fill=\"var(--primary)\"/></svg>\n                    </div>\n                    <div class=\"gr-flow-node gr-flow-output\">\n                        <div class=\"gr-flow-dot\" style=\"background: var(--orange);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"white\"><path d=\"M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z\"/></svg>\n                        </div>\n                        <span>Ranked Results</span>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Recommendation types -->\n            <div class=\"gr-types-card\">\n                <h4>What the Recommender Produces</h4>\n                <div class=\"gr-type-list\">\n                    <div class=\"gr-type-item\">\n                        <div class=\"gr-type-icon\" style=\"background: rgba(0, 182, 161, 0.08);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z\"/></svg>\n                        </div>\n                        <div>\n                            <strong>Skill Recommendations</strong>\n                            <span>Given a title or role, surface the most statistically relevant skills &mdash; ranked by edge weight, not alphabetical order</span>\n                        </div>\n                    </div>\n                    <div class=\"gr-type-item\">\n                        <div class=\"gr-type-icon\" style=\"background: rgba(104, 97, 226, 0.08);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--purple)\"><path d=\"M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3z\"/></svg>\n                        </div>\n                        <div>\n                            <strong>Title Recommendations</strong>\n                            <span>Given a set of skills, recommend the roles that best match &mdash; even roles the user hasn't considered</span>\n                        </div>\n                    </div>\n                    <div class=\"gr-type-item\">\n                        <div class=\"gr-type-icon\" style=\"background: rgba(59, 148, 220, 0.08);\">\n                            <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"var(--blue)\"><path d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"/></svg>\n                        </div>\n                        <div>\n                            <strong>Cross-Attribute Discovery</strong>\n                            <span>Traverse across attribute types &mdash; skills to titles to industries &mdash; revealing non-obvious connections through multi-hop paths</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Right: Live example + why it's different -->\n        <div class=\"gr-right\">\n            <!-- Live example -->\n            <div class=\"gr-example-card\">\n                <h4>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--orange)\"><path d=\"M7 2v11h3v9l7-12h-4l4-8z\"/></svg>\n                    Recommendation in Action\n                </h4>\n                <div class=\"gr-example-input\">\n                    <span class=\"gr-example-label\">Input</span>\n                    <span class=\"gr-example-value\">\"Machine Learning Engineer\"</span>\n                </div>\n                <div class=\"gr-example-arrow\">\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\"><path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z\"/></svg>\n                </div>\n                <div class=\"gr-results-section\">\n                    <div class=\"gr-result-group\">\n                        <div class=\"gr-result-group-label\" style=\"color: var(--primary);\">Recommended Skills</div>\n                        <div class=\"gr-result-items\">\n                            <div class=\"gr-result-item\">\n                                <span class=\"gr-result-name\">PyTorch / TensorFlow</span>\n                                <span class=\"gr-result-weight\" style=\"color: var(--primary);\">0.93</span>\n                                <div class=\"gr-result-bar\"><div class=\"gr-result-bar-fill\" style=\"width: 93%; background: var(--primary);\"></div></div>\n                            </div>\n                            <div class=\"gr-result-item\">\n                                <span class=\"gr-result-name\">Deep Learning</span>\n                                <span class=\"gr-result-weight\" style=\"color: var(--primary);\">0.89</span>\n                                <div class=\"gr-result-bar\"><div class=\"gr-result-bar-fill\" style=\"width: 89%; background: var(--primary);\"></div></div>\n                            </div>\n                            <div class=\"gr-result-item\">\n                                <span class=\"gr-result-name\">MLOps / Model Deployment</span>\n                                <span class=\"gr-result-weight\" style=\"color: var(--primary);\">0.76</span>\n                                <div class=\"gr-result-bar\"><div class=\"gr-result-bar-fill\" style=\"width: 76%; background: var(--primary);\"></div></div>\n                            </div>\n                            <div class=\"gr-result-item\">\n                                <span class=\"gr-result-name\">Data Pipeline Architecture</span>\n                                <span class=\"gr-result-weight\" style=\"color: var(--primary);\">0.61</span>\n                                <div class=\"gr-result-bar\"><div class=\"gr-result-bar-fill\" style=\"width: 61%; background: var(--primary);\"></div></div>\n                            </div>\n                        </div>\n                    </div>\n                    <div class=\"gr-result-group\">\n                        <div class=\"gr-result-group-label\" style=\"color: var(--purple);\">Recommended Titles</div>\n                        <div class=\"gr-result-items\">\n                            <div class=\"gr-result-item\">\n                                <span class=\"gr-result-name\">Data Scientist</span>\n                                <span class=\"gr-result-weight\" style=\"color: var(--purple);\">0.84</span>\n                                <div class=\"gr-result-bar\"><div class=\"gr-result-bar-fill\" style=\"width: 84%; background: var(--purple);\"></div></div>\n                            </div>\n                            <div class=\"gr-result-item\">\n                                <span class=\"gr-result-name\">Applied Scientist</span>\n                                <span class=\"gr-result-weight\" style=\"color: var(--purple);\">0.71</span>\n                                <div class=\"gr-result-bar\"><div class=\"gr-result-bar-fill\" style=\"width: 71%; background: var(--purple);\"></div></div>\n                            </div>\n                            <div class=\"gr-result-item\">\n                                <span class=\"gr-result-name\">AI Platform Engineer</span>\n                                <span class=\"gr-result-weight\" style=\"color: var(--purple);\">0.64</span>\n                                <div class=\"gr-result-bar\"><div class=\"gr-result-bar-fill\" style=\"width: 64%; background: var(--purple);\"></div></div>\n                            </div>\n                        </div>\n                    </div>\n                </div>\n                <div class=\"gr-example-note\">\n                    Every result is ranked by computed edge weight &mdash; not keyword frequency, not alphabetical order. Weights reflect real co-occurrence strength across millions of profiles.\n                </div>\n            </div>\n\n            <!-- What makes this different -->\n            <div class=\"gr-diff-card\">\n                <h5>\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary-dark)\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"/></svg>\n                    Why Graph-Based Recommendations Are Different\n                </h5>\n                <div class=\"gr-diff-points\">\n                    <div class=\"gr-diff-point\">\n                        <div class=\"gr-diff-bullet\" style=\"background: var(--primary);\"></div>\n                        <div><strong>Computed, not curated.</strong> Every recommendation is derived from statistical aggregation across the entire dataset &mdash; not manually assembled lookup tables.</div>\n                    </div>\n                    <div class=\"gr-diff-point\">\n                        <div class=\"gr-diff-bullet\" style=\"background: var(--purple);\"></div>\n                        <div><strong>Multi-dimensional.</strong> The same graph that recommends skills for a title also recommends titles for a skill, and discovers cross-attribute paths that span industries and functions.</div>\n                    </div>\n                    <div class=\"gr-diff-point\">\n                        <div class=\"gr-diff-bullet\" style=\"background: var(--orange);\"></div>\n                        <div><strong>Confidence-ranked.</strong> Edge weights quantify recommendation strength. Weak associations are automatically pruned &mdash; only statistically significant connections surface.</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"0\">\n        <h4>Speaker Notes</h4>\n        Now let's talk about what happens when you take that attribute graph and turn it into a recommender. This is our most advanced recommendation engine. Rather than relying on simple lookups or manually curated association tables, we traverse the weighted graph to generate recommendations dynamically. Here's how it works: you give the system an input &mdash; a title, a skill, any attribute &mdash; and it walks the graph, aggregating signal strength across connected edges. The output is a confidence-ranked list of recommendations. For \"Machine Learning Engineer,\" the graph surfaces PyTorch and TensorFlow at 0.93 &mdash; almost always co-occurring. Deep Learning at 0.89. But it also recommends titles: Data Scientist, Applied Scientist, AI Platform Engineer &mdash; roles that share deep structural overlap in the graph. What makes this different from a standard recommender? Three things. First, it's computed, not curated &mdash; every recommendation is derived from statistical aggregation across millions of profiles, not a hand-built mapping. Second, it's multi-dimensional &mdash; the same traversal engine works across skills to titles, titles to skills, skills to industries, any attribute pair. Third, it's confidence-ranked. Weak associations are automatically pruned. Only statistically significant connections surface. This powers everything from job description autofill to candidate skill inference to career pathway generation.\n    </div>\n</div>\n", "slides/12-transition.html": "<!-- Transition: Engine → Insight -->\n<div class=\"slide slide-demo\" data-slide=\"0\">\n    <div class=\"demo-content\">\n        <div class=\"demo-label\">Now Let's See It Work</div>\n        <h2>What This Makes Possible</h2>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"0\">\n        <h4>Speaker Notes</h4>\n        That's the engine. Taxonomy, convergence, proficiency scoring, the intelligence graph &mdash; all working together. Now let's see what it makes possible when we point it at real workforce questions.\n    </div>\n</div>\n", "slides/03-intelligence-layer.html": "<!-- Slide 03: The Living Intelligence Layer — Where We're Headed -->\n<div\n  class=\"slide slide-content slide-intelligence-layer\"\n  data-slide=\"2\"\n  style=\"\n    background: linear-gradient(135deg, #0a0f14 0%, #0d1420 50%, #0a0f18 100%);\n    color: white;\n    overflow: hidden;\n  \"\n>\n  <!-- Ambient glow background -->\n  <div class=\"il-ambient-glow\"></div>\n\n  <div class=\"slide-header\">\n    <div class=\"slide-number\" style=\"color: #00b6a1\">\n      03\n      <span\n        style=\"\n          font-size: 9px;\n          color: rgba(255, 150, 48, 0.8);\n          margin-left: 8px;\n          letter-spacing: 1.5px;\n        \"\n        >&#9670; COMING NEXT</span\n      >\n    </div>\n    <p\n      style=\"\n        color: var(--primary);\n        font-size: 13px;\n        font-weight: 700;\n        text-transform: uppercase;\n        letter-spacing: 3px;\n        margin-bottom: 8px;\n      \"\n    >\n      From Engine to Outcomes\n    </p>\n    <h2 class=\"slide-title-text\" style=\"color: white\">\n      The Living Intelligence Layer\n    </h2>\n    <p style=\"color: rgba(255,255,255,0.65); font-size: 13px; font-weight: 400; margin-top: 8px; line-height: 1.6;\">\n      <span style=\"color: #00B6A1;\">The challenge Censia solves is the underlying data infrastructure: resolving entity ambiguity at scale</span> (for example, &ldquo;Is J. Smith, Software Engineer in Mountain View the same person as John Smith, Engineer at Google?&rdquo;), <span style=\"color: #00B6A1;\">maintaining accuracy across hundreds of millions of records, and compounding that intelligence over time.</span> Censia has been doing exactly this since 2017, and that depth of structured, clean workforce data is not something that can be replicated in a few engineering sprints.\n    </p>\n  </div>\n\n  <div class=\"il-layout\">\n    <!-- Left: 5 Derived Intelligence Capabilities -->\n    <div class=\"il-capabilities\">\n      <div class=\"il-section-label\">DERIVED INTELLIGENCE</div>\n\n      <!-- Layer 1: Role Archetypes -->\n      <div class=\"il-cap\" style=\"--cap-color: var(--primary)\">\n        <div class=\"il-cap-icon\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--primary)\">\n            <path\n              d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z\"\n            />\n          </svg>\n        </div>\n        <div class=\"il-cap-content\">\n          <div class=\"il-cap-head\">\n            <span class=\"il-cap-tag\">Layer 1</span>\n            <h3>Role Archetypes</h3>\n          </div>\n          <p>\n            ML fingerprinting + clustering groups similar titles together\n            &mdash; DevOps Engineer, SRE, and Platform Engineer all resolve to\n            one archetype\n          </p>\n          <div class=\"il-cap-example\">\n            <span class=\"il-example-tag\">DevOps Eng.</span>\n            <span class=\"il-example-eq\">=</span>\n            <span class=\"il-example-tag\">SRE</span>\n            <span class=\"il-example-eq\">=</span>\n            <span class=\"il-example-tag\">Platform Eng.</span>\n          </div>\n        </div>\n      </div>\n\n      <div class=\"il-cap-conn\"></div>\n\n      <!-- Layer 2: Career Transitions -->\n      <div class=\"il-cap\" style=\"--cap-color: var(--blue)\">\n        <div class=\"il-cap-icon\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--blue)\">\n            <path\n              d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"\n            />\n          </svg>\n        </div>\n        <div class=\"il-cap-content\">\n          <div class=\"il-cap-head\">\n            <span class=\"il-cap-tag\">Layer 2</span>\n            <h3>Career Transitions</h3>\n          </div>\n          <p>\n            Analyze who moves from what role to what, how often, and median\n            tenure before transition &mdash; across hundreds of millions of\n            career histories\n          </p>\n        </div>\n      </div>\n\n      <div class=\"il-cap-conn\"></div>\n\n      <!-- Layer 3: Skill Inference -->\n      <div class=\"il-cap\" style=\"--cap-color: var(--purple)\">\n        <div class=\"il-cap-icon\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--purple)\">\n            <path\n              d=\"M9 21c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7z\"\n            />\n          </svg>\n        </div>\n        <div class=\"il-cap-content\">\n          <div class=\"il-cap-head\">\n            <span class=\"il-cap-tag\">Layer 3</span>\n            <h3>Skill Inference</h3>\n          </div>\n          <p>\n            Statistical lift analysis reveals which skills are strongly\n            associated with which roles &mdash; turning implicit patterns into\n            explicit signals\n          </p>\n        </div>\n      </div>\n\n      <div class=\"il-cap-conn\"></div>\n\n      <!-- Layer 4: Career Readiness Scores -->\n      <div class=\"il-cap\" style=\"--cap-color: var(--orange)\">\n        <div class=\"il-cap-icon\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--orange)\">\n            <path\n              d=\"M19.5 9.5c-1.03 0-1.9.62-2.29 1.5h-2.92c-.39-.88-1.26-1.5-2.29-1.5s-1.9.62-2.29 1.5H6.79c-.39-.88-1.26-1.5-2.29-1.5C3.12 9.5 2 10.62 2 12s1.12 2.5 2.5 2.5c1.03 0 1.9-.62 2.29-1.5h2.92c.39.88 1.26 1.5 2.29 1.5s1.9-.62 2.29-1.5h2.92c.39.88 1.26 1.5 2.29 1.5 1.38 0 2.5-1.12 2.5-2.5s-1.12-2.5-2.5-2.5z\"\n            />\n          </svg>\n        </div>\n        <div class=\"il-cap-content\">\n          <div class=\"il-cap-head\">\n            <span class=\"il-cap-tag\">Layer 4</span>\n            <h3>Career Readiness Scores</h3>\n          </div>\n          <p>\n            Pre-computed scores showing how ready each person is for various\n            target roles &mdash; combining transition fit, tenure, skills, and\n            trajectory\n          </p>\n        </div>\n      </div>\n\n      <div class=\"il-cap-conn\"></div>\n\n      <!-- Layer 5: Archetype Resolution -->\n      <div class=\"il-cap\" style=\"--cap-color: #22c55e\">\n        <div class=\"il-cap-icon\">\n          <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#22C55E\">\n            <path\n              d=\"M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z\"\n            />\n          </svg>\n        </div>\n        <div class=\"il-cap-content\">\n          <div class=\"il-cap-head\">\n            <span class=\"il-cap-tag\">Layer 5</span>\n            <h3>Archetype Resolution</h3>\n          </div>\n          <p>\n            Natural language to archetype lookup &mdash; exact match, fuzzy\n            match, or embedding similarity for novel titles never seen before\n          </p>\n        </div>\n      </div>\n    </div>\n\n    <!-- Right: The Unlock -->\n    <div class=\"il-unlock\">\n      <div class=\"il-section-label\">THE UNLOCK</div>\n\n      <div class=\"il-unlock-flow\">\n        <!-- Step 1: Current Role -->\n        <div class=\"il-unlock-step\" style=\"--step-color: var(--blue)\">\n          <div\n            class=\"il-unlock-icon\"\n            style=\"background: rgba(59, 148, 220, 0.15)\"\n          >\n            <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"var(--blue)\">\n              <path\n                d=\"M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z\"\n              />\n            </svg>\n          </div>\n          <div class=\"il-unlock-text\">\n            <strong>Current Role</strong>\n            <span>Backend Engineer, 3.5 years</span>\n          </div>\n        </div>\n\n        <div class=\"il-unlock-arrow\">\n          <svg\n            width=\"20\"\n            height=\"20\"\n            viewBox=\"0 0 24 24\"\n            fill=\"rgba(0,182,161,0.5)\"\n          >\n            <path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z\" />\n          </svg>\n        </div>\n\n        <!-- Step 2: Transition Analysis -->\n        <div class=\"il-unlock-step\" style=\"--step-color: var(--purple)\">\n          <div\n            class=\"il-unlock-icon\"\n            style=\"background: rgba(104, 97, 226, 0.15)\"\n          >\n            <svg\n              width=\"16\"\n              height=\"16\"\n              viewBox=\"0 0 24 24\"\n              fill=\"var(--purple)\"\n            >\n              <path\n                d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"\n              />\n            </svg>\n          </div>\n          <div class=\"il-unlock-text\">\n            <strong>Transition Analysis</strong>\n            <span>Backend Eng. frequently transition to DevOps</span>\n          </div>\n        </div>\n\n        <div class=\"il-unlock-arrow\">\n          <svg\n            width=\"20\"\n            height=\"20\"\n            viewBox=\"0 0 24 24\"\n            fill=\"rgba(0,182,161,0.5)\"\n          >\n            <path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z\" />\n          </svg>\n        </div>\n\n        <!-- Step 3: Readiness Score -->\n        <div class=\"il-unlock-step\" style=\"--step-color: var(--orange)\">\n          <div\n            class=\"il-unlock-icon\"\n            style=\"background: rgba(255, 150, 48, 0.15)\"\n          >\n            <svg\n              width=\"16\"\n              height=\"16\"\n              viewBox=\"0 0 24 24\"\n              fill=\"var(--orange)\"\n            >\n              <path\n                d=\"M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z\"\n              />\n            </svg>\n          </div>\n          <div class=\"il-unlock-text\">\n            <strong>Readiness Score</strong>\n            <span>High readiness signal for DevOps roles</span>\n          </div>\n        </div>\n\n        <div class=\"il-unlock-arrow\">\n          <svg\n            width=\"20\"\n            height=\"20\"\n            viewBox=\"0 0 24 24\"\n            fill=\"rgba(0,182,161,0.5)\"\n          >\n            <path d=\"M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z\" />\n          </svg>\n        </div>\n\n        <!-- Step 4: Hidden Talent Surfaced -->\n        <div\n          class=\"il-unlock-step il-unlock-result\"\n          style=\"--step-color: var(--primary)\"\n        >\n          <div\n            class=\"il-unlock-icon\"\n            style=\"background: rgba(0, 182, 161, 0.2)\"\n          >\n            <svg\n              width=\"16\"\n              height=\"16\"\n              viewBox=\"0 0 24 24\"\n              fill=\"var(--primary)\"\n            >\n              <path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\" />\n            </svg>\n          </div>\n          <div class=\"il-unlock-text\">\n            <strong>Hidden Talent Surfaced</strong>\n            <span>Candidate never held a DevOps title</span>\n          </div>\n        </div>\n      </div>\n\n      <!-- Living data indicator -->\n      <div class=\"il-living-badge il-living-badge-lg\">\n        <div class=\"il-living-pulse\"></div>\n        <span\n          >Continuously re-deriving &amp; reindexing &mdash; in\n          development</span\n        >\n      </div>\n    </div>\n  </div>\n\n  <!-- Bottom callout -->\n  <div class=\"il-callout\">\n    <strong\n      style=\"\n        color: var(--orange);\n        font-size: 10px;\n        letter-spacing: 1.5px;\n        text-transform: uppercase;\n        display: block;\n        margin-bottom: 6px;\n        font-style: normal;\n      \"\n      >Where we&rsquo;re headed</strong\n    >\n    Find people who <strong>could do</strong> a job &mdash; not just who\n    <strong>has done</strong> it\n  </div>\n\n  <div class=\"speaker-notes\" data-notes=\"0\">\n    <h4>Speaker Notes</h4>\n    Now let me show you where we're headed next. On top of that pipeline, we're\n    building a living intelligence layer &mdash; this is the next evolution of\n    our platform. First, Role Archetypes. We use ML fingerprinting and\n    clustering to group similar job titles together. DevOps Engineer, Site\n    Reliability Engineer, Platform Engineer &mdash; these are all the same\n    archetype. This means when you search for DevOps talent, you automatically\n    get SREs and Platform Engineers too, without having to guess every title\n    variation. Second, Career Transitions. We analyze hundreds of millions of\n    career histories to map who moves from what role to what role, how often,\n    and how long they typically stay before transitioning. We can see that\n    Backend Engineers frequently transition into DevOps roles, and we know the\n    typical tenure before that move. Third, Skill Inference. Through statistical\n    lift analysis, we determine which skills are strongly associated with which\n    roles. Kubernetes is 8.5 times more common among DevOps professionals than\n    the general population &mdash; that's a powerful signal. Fourth, Career\n    Readiness Scores. We pre-compute a readiness score for each person against\n    various target roles, combining transition likelihood, tenure, skills\n    overlap, and career trajectory. One number that tells you how ready someone\n    is for a role they've never held. Fifth, Archetype Resolution. Users just\n    type naturally &mdash; \"Platform Engineer\" &mdash; and the system resolves\n    it to the right archetype through exact match, fuzzy match, or embedding\n    similarity. Here's the key unlock: look at the flow on the right. Take a\n    Backend Engineer with 3.5 years of experience. Our transition analysis shows\n    people like them frequently become DevOps Engineers. They show a high\n    readiness signal for DevOps roles. We surface this person as hidden talent\n    &mdash; someone who has never held a DevOps title but is statistically\n    likely to succeed in the role. This is what we mean by finding people who\n    COULD do a job, not just who HAS done it. And crucially, this intelligence\n    layer is living &mdash; it continuously re-derives and reindexes as new data\n    comes in.\n  </div>\n</div>\n", "slides/13-ai-infrastructure.html": "<!-- Slide 1b: Purpose-Built AI for Talent Intelligence -->\n<div class=\"slide slide-content slide-ai-stack\" data-slide=\"2\" style=\"background: linear-gradient(135deg, #0a0f14 0%, #0d1420 50%, #0a0f18 100%); color: white;\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\" style=\"color: #00B6A1;\">02</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">From Engine to Outcomes</p>\n        <h2 class=\"slide-title-text\" style=\"color: white;\">Workforce Data Infrastructure Built for AI</h2>\n        <p style=\"color: rgba(255,255,255,0.65); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Multi-model architecture delivers higher-fidelity intelligence for matching, pathways, and planning.</p>\n    </div>\n\n    <div class=\"ai-stack-layout\">\n        <!-- Left: 4 Layer Cards -->\n        <div class=\"ai-layers\">\n            <div class=\"ai-layer\" style=\"--lc: var(--primary);\">\n                <div class=\"ai-layer-content\">\n                    <div class=\"ai-layer-head\">\n                        <span class=\"ai-layer-tag\">Layer 1</span>\n                        <h3>Embedding Foundation</h3>\n                    </div>\n                    <p>Domain-specific vector representations for skills, titles, companies, and industries</p>\n                    <div class=\"ai-techs\">\n                        <span class=\"ai-tech\">Transformer Architectures</span>\n                        <span class=\"ai-tech\">Contrastive Learning</span>\n                        <span class=\"ai-tech\">Domain Embeddings</span>\n                    </div>\n                </div>\n            </div>\n\n            <div class=\"ai-layer-conn\"></div>\n\n            <div class=\"ai-layer\" style=\"--lc: var(--blue);\">\n                <div class=\"ai-layer-content\">\n                    <div class=\"ai-layer-head\">\n                        <span class=\"ai-layer-tag\">Layer 2</span>\n                        <h3>Curation &amp; Labeling</h3>\n                    </div>\n                    <p>Expert-in-the-loop validation pipelines for data precision and model explainability</p>\n                    <div class=\"ai-techs\">\n                        <span class=\"ai-tech\">Data Curation</span>\n                        <span class=\"ai-tech\">Visualization Tools</span>\n                        <span class=\"ai-tech\">Expert-in-the-Loop</span>\n                        <span class=\"ai-tech\">Quality Validation</span>\n                    </div>\n                </div>\n            </div>\n\n            <div class=\"ai-layer-conn\"></div>\n\n            <div class=\"ai-layer\" style=\"--lc: var(--purple);\">\n                <div class=\"ai-layer-content\">\n                    <div class=\"ai-layer-head\">\n                        <span class=\"ai-layer-tag\">Layer 3</span>\n                        <h3>Knowledge Models</h3>\n                    </div>\n                    <p>Automated taxonomy induction, hierarchy learning, and semantic relationship extraction</p>\n                    <div class=\"ai-techs\">\n                        <span class=\"ai-tech\">Taxonomy Induction</span>\n                        <span class=\"ai-tech\">Graph Learning</span>\n                        <span class=\"ai-tech\">Semantic Extraction</span>\n                        <span class=\"ai-tech\">Knowledge Graphs</span>\n                    </div>\n                </div>\n            </div>\n\n            <div class=\"ai-layer-conn\"></div>\n\n            <div class=\"ai-layer\" style=\"--lc: var(--orange);\">\n                <div class=\"ai-layer-content\">\n                    <div class=\"ai-layer-head\">\n                        <span class=\"ai-layer-tag\">Layer 4</span>\n                        <h3>Ranking &amp; Scoring</h3>\n                    </div>\n                    <p>Match quality optimization with learning-to-rank models across talent datasets</p>\n                    <div class=\"ai-techs\">\n                        <span class=\"ai-tech\">Learning to Rank</span>\n                        <span class=\"ai-tech\">Similarity Models</span>\n                        <span class=\"ai-tech\">Relevance Optimization</span>\n                        <span class=\"ai-tech\">Multi-Signal Fusion</span>\n                    </div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Right: 3D Orbital Visualization -->\n        <div class=\"ai-orbit\">\n            <div class=\"ai-orbit-scene\">\n                <!-- Ring 4 (outermost — orange) -->\n                <div class=\"ai-orbit-ring ai-ring-4\">\n                    <div class=\"ai-orbit-node\" style=\"top: 6.7%; left: 75%;\"></div>\n                    <div class=\"ai-orbit-node\" style=\"top: 100%; left: 50%;\"></div>\n                </div>\n                <!-- Ring 3 (purple) -->\n                <div class=\"ai-orbit-ring ai-ring-3\">\n                    <div class=\"ai-orbit-node\" style=\"top: 50%; left: 100%;\"></div>\n                    <div class=\"ai-orbit-node\" style=\"top: 6.7%; left: 25%;\"></div>\n                    <div class=\"ai-orbit-node\" style=\"top: 93.3%; left: 25%;\"></div>\n                </div>\n                <!-- Ring 2 (blue) -->\n                <div class=\"ai-orbit-ring ai-ring-2\">\n                    <div class=\"ai-orbit-node\" style=\"top: 25%; left: 6.7%;\"></div>\n                    <div class=\"ai-orbit-node\" style=\"top: 75%; left: 93.3%;\"></div>\n                </div>\n                <!-- Ring 1 (innermost — teal) -->\n                <div class=\"ai-orbit-ring ai-ring-1\">\n                    <div class=\"ai-orbit-node\" style=\"top: 14.6%; left: 85.4%;\"></div>\n                    <div class=\"ai-orbit-node\" style=\"top: 85.4%; left: 14.6%;\"></div>\n                </div>\n                <!-- Central Sphere -->\n                <div class=\"ai-orbit-core\">\n                    <div class=\"ai-core-glow\"></div>\n                    <span>AI/ML</span>\n                </div>\n            </div>\n            <div class=\"ai-orbit-tagline\">Censia AI &mdash; at the center of it all</div>\n        </div>\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"2\">\n        <h4>Speaker Notes</h4>\n        Behind the data we just showed you, there's a purpose-built AI and machine learning engine. Let me walk you through the four layers.\n\n        First, the embedding foundation &mdash; we train custom transformer architectures using contrastive learning to create domain-specific vector representations for every entity type: skills, titles, companies, industries. These aren't off-the-shelf models &mdash; they understand the language of talent.\n\n        Second, curation and labeling &mdash; we've built custom data pipelines with expert-in-the-loop validation. Every model output passes through quality gates with visualization tools that maintain precision and explainability at scale.\n\n        Third, knowledge models &mdash; this is where structure emerges. Automated taxonomy induction discovers skill hierarchies, graph learning maps relationships between entities, and semantic extraction builds the knowledge graph that connects everything.\n\n        And fourth, ranking and scoring &mdash; learning-to-rank models, similarity scoring, and multi-signal fusion that optimize match quality across our entire talent dataset.\n\n        These four layers work together as a unified system &mdash; each one feeding the next. Every capability we show you in the following slides is powered by this stack.\n    </div>\n</div>\n", "slides/14-talent-drift.html": "<!-- Slide: Talent Attribute Drift — A Decade of Convergence -->\n<div class=\"slide slide-content\" data-slide=\"0\" id=\"driftSlide\" style=\"background: linear-gradient(135deg, #060a0f 0%, #0a1018 40%, #08120f 100%); color: white; overflow: hidden;\">\n\n    <!-- ═══ FULL-BLEED 3D GRAPH (behind everything) ═══ -->\n    <div id=\"driftGraphBg\" class=\"drift-graph-bg\"></div>\n\n    <!-- Ambient radial glow that pulses with time -->\n    <div class=\"drift-ambient-glow\" id=\"driftAmbientGlow\"></div>\n\n    <!-- ═══ FOREGROUND CONTENT ═══ -->\n    <div class=\"drift-fg\">\n\n        <div class=\"slide-header\" style=\"position: relative; z-index: 20;\">\n            <div class=\"slide-number\" style=\"color: #00B6A1;\">00</div>\n            <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">From Engine to Outcomes</p>\n            <h2 class=\"slide-title-text\" style=\"color: white;\">Talent Attribute Drift</h2>\n            <p style=\"color: rgba(255,255,255,0.65); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">Adaptive skill modeling continuously recalibrates as role definitions, market demand, and capability expectations shift.</p>\n        </div>\n\n        <div class=\"drift-layout\">\n            <!-- Left column: narrative cards (glassmorphism) -->\n            <div class=\"drift-left\">\n                <div class=\"drift-narrative-card\">\n                    <h4>\n                        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#00B6A1\"><path d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"/></svg>\n                        Skills Don't Stand Still\n                    </h4>\n                    <p>Over the past decade, entire skill clusters have migrated, merged, and reshaped &mdash; roles that shared nothing ten years ago now overlap significantly.</p>\n                    <p>This graph visualizes <strong>real drift patterns</strong> computed across millions of career histories. Watch how disconnected clusters converge as the talent landscape evolves.</p>\n                </div>\n\n                <!-- Candidate story -->\n                <div class=\"drift-story-card\">\n                    <div class=\"drift-story-header\">\n                        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#FF9630\"><path d=\"M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z\"/></svg>\n                        Two Careers, One Convergence\n                    </div>\n                    <div class=\"drift-personas\">\n                        <div class=\"drift-persona\">\n                            <div class=\"drift-persona-avatar\" style=\"background: rgba(59, 148, 220, 0.25); border-color: rgba(59, 148, 220, 0.5);\">A</div>\n                            <div class=\"drift-persona-info\">\n                                <strong>Candidate A</strong>\n                                <span>Marketing Analyst, 2015</span>\n                                <span class=\"drift-persona-skills\">Excel, Campaign Metrics, Segmentation</span>\n                            </div>\n                        </div>\n                        <div class=\"drift-persona-gap\">\n                            <div class=\"drift-gap-line\"></div>\n                            <div class=\"drift-gap-label\" id=\"driftOverlapLabel\">0% overlap</div>\n                            <div class=\"drift-gap-line\"></div>\n                        </div>\n                        <div class=\"drift-persona\">\n                            <div class=\"drift-persona-avatar\" style=\"background: rgba(104, 97, 226, 0.25); border-color: rgba(104, 97, 226, 0.5);\">B</div>\n                            <div class=\"drift-persona-info\">\n                                <strong>Candidate B</strong>\n                                <span>Data Engineer, 2015</span>\n                                <span class=\"drift-persona-skills\">SQL, ETL Pipelines, Hadoop</span>\n                            </div>\n                        </div>\n                    </div>\n                    <div class=\"drift-story-insight\" id=\"driftInsightText\">\n                        In 2015, these two profiles shared <strong>zero common skills</strong>. Their worlds didn't touch.\n                    </div>\n                </div>\n\n                <!-- Implications -->\n                <div class=\"drift-implications-card\">\n                    <h5>\n                        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"#00B6A1\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z\"/></svg>\n                        Why This Matters\n                    </h5>\n                    <div class=\"drift-impl-items\">\n                        <div class=\"drift-impl-item\">\n                            <div class=\"drift-impl-bullet\" style=\"background: #00B6A1;\"></div>\n                            <span>Static skill taxonomies decay &mdash; the platform must model drift to stay accurate</span>\n                        </div>\n                        <div class=\"drift-impl-item\">\n                            <div class=\"drift-impl-bullet\" style=\"background: #FF9630;\"></div>\n                            <span>Talent pools that seem unrelated today may converge tomorrow &mdash; early detection unlocks strategic hiring</span>\n                        </div>\n                        <div class=\"drift-impl-item\">\n                            <div class=\"drift-impl-bullet\" style=\"background: #6861E2;\"></div>\n                            <span>Career pathway recommendations must account for how the landscape is shifting, not just where it is</span>\n                        </div>\n                    </div>\n                </div>\n            </div>\n\n            <!-- Right column: timeline + metrics (floating over graph) -->\n            <div class=\"drift-right\">\n                <!-- Year badge (large, floating) -->\n                <div class=\"drift-year-display\" id=\"driftYearBadge\">2015</div>\n\n                <!-- Spacer to push controls to bottom -->\n                <div class=\"drift-right-spacer\"></div>\n\n                <!-- Legend -->\n                <div class=\"drift-graph-legend\">\n                    <div class=\"drift-legend-item\">\n                        <div class=\"drift-legend-dot\" style=\"background: #3B94DC; box-shadow: 0 0 6px rgba(59,148,220,0.6);\"></div>\n                        <span>Marketing &amp; Analytics</span>\n                    </div>\n                    <div class=\"drift-legend-item\">\n                        <div class=\"drift-legend-dot\" style=\"background: #6861E2; box-shadow: 0 0 6px rgba(104,97,226,0.6);\"></div>\n                        <span>Data Engineering</span>\n                    </div>\n                    <div class=\"drift-legend-item\">\n                        <div class=\"drift-legend-dot\" style=\"background: #00B6A1; box-shadow: 0 0 6px rgba(0,182,161,0.6);\"></div>\n                        <span>Converged Skills</span>\n                    </div>\n                    <div class=\"drift-legend-item\">\n                        <div class=\"drift-legend-dot\" style=\"background: #FF9630; box-shadow: 0 0 6px rgba(255,150,48,0.6);\"></div>\n                        <span>Emerging Bridge</span>\n                    </div>\n                </div>\n\n                <!-- Timeline scrubber -->\n                <div class=\"drift-timeline\">\n                    <div class=\"drift-timeline-track\">\n                        <div class=\"drift-timeline-fill\" id=\"driftTimelineFill\"></div>\n                        <div class=\"drift-timeline-thumb\" id=\"driftTimelineThumb\"></div>\n                    </div>\n                    <div class=\"drift-timeline-labels\">\n                        <span>2015</span>\n                        <span>2017</span>\n                        <span>2019</span>\n                        <span>2021</span>\n                        <span>2023</span>\n                        <span>2025</span>\n                    </div>\n                </div>\n\n                <!-- Drift metrics -->\n                <div class=\"drift-metrics\">\n                    <div class=\"drift-metric\">\n                        <div class=\"drift-metric-value\" id=\"driftMetricOverlap\" style=\"color: #00B6A1;\">0%</div>\n                        <div class=\"drift-metric-label\">Skill Overlap</div>\n                    </div>\n                    <div class=\"drift-metric\">\n                        <div class=\"drift-metric-value\" id=\"driftMetricEdges\" style=\"color: #FF9630;\">0</div>\n                        <div class=\"drift-metric-label\">Cross-Cluster Edges</div>\n                    </div>\n                    <div class=\"drift-metric\">\n                        <div class=\"drift-metric-value\" id=\"driftMetricBridge\" style=\"color: #6861E2;\">0</div>\n                        <div class=\"drift-metric-label\">Bridge Skills</div>\n                    </div>\n                </div>\n            </div>\n        </div>\n    </div>\n\n    <div class=\"speaker-notes\" data-notes=\"0\">\n        <h4>Speaker Notes</h4>\n        This is one of the most important things to understand about talent intelligence: skills don't stand still. What you're seeing is a real-time visualization of how talent attribute clusters have drifted over the past decade, computed across our dataset of millions of career histories. Start on the left in 2015 — you see two clearly separated clusters. Blue is marketing and analytics: Excel, campaign metrics, segmentation. Purple is data engineering: SQL, ETL pipelines, Hadoop. These two worlds barely touched. Now watch what happens as we move through time. By 2018, a few bridge skills start appearing — Python shows up in both clusters. By 2020, SQL has migrated from being a purely data engineering skill to appearing in marketing analytics profiles. By 2023, you see significant overlap. Skills like Python, SQL, data visualization, and basic statistics are now shared across both domains. The overlap has gone from zero to around 50 percent. Take two real candidates: Candidate A was a Marketing Analyst in 2015, Candidate B was a Data Engineer. Eight years ago, their skill profiles had nothing in common. Today, Candidate A's evolved skill set has a 50 percent overlap with Candidate B's current profile. This has massive implications. Static skill taxonomies decay — if you're still using a skill framework from five years ago, it's already wrong. Talent pools that seem unrelated today may converge tomorrow, and if you can detect that early, you unlock strategic hiring advantages. And career pathway recommendations must account for where the landscape is heading, not just where it is today. That's what our temporal intelligence layer captures.\n    </div>\n</div>\n", "slides/15-career-pathways.html": "<!-- Slide 8: Career Transition Pathways (Merged — Skills Graph + Career Intelligence) -->\n<div class=\"slide slide-content\" data-slide=\"8\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">08</div>\n        <p style=\"color: var(--primary); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;\">From Engine to Outcomes</p>\n        <h2 class=\"slide-title-text\">Career Transition Pathways & Readiness</h2>\n        <p style=\"color: rgba(0,0,0,0.55); font-size: 19px; font-weight: 400; margin-top: 8px; line-height: 1.5;\">In action: skills and proficiency resolve into transition likelihood, gap-closure steps, and role readiness at scale.</p>\n    </div>\n    <div class=\"pathway-layout\">\n        <!-- Main: Pathway Visualization -->\n        <div class=\"pathway-main\">\n            <!-- Current Role -->\n            <div class=\"pathway-role current-role\">\n                <div class=\"role-header\">\n                    <div class=\"role-badge current\">Current Role</div>\n                    <h3>Data Analyst</h3>\n                </div>\n                <div class=\"role-skills\">\n                    <div class=\"role-skill transfer\"><span class=\"sk-name\">SQL</span><span class=\"sk-level\">Level 4</span></div>\n                    <div class=\"role-skill transfer\"><span class=\"sk-name\">Excel</span><span class=\"sk-level\">Level 5</span></div>\n                    <div class=\"role-skill develop\"><span class=\"sk-name\">Python</span><span class=\"sk-level\">Level 3</span></div>\n                    <div class=\"role-skill develop\"><span class=\"sk-name\">Statistics</span><span class=\"sk-level\">Level 3</span></div>\n                    <div class=\"role-skill transfer\"><span class=\"sk-name\">Visualization</span><span class=\"sk-level\">Level 4</span></div>\n                </div>\n            </div>\n\n            <!-- Pathway Arrow with Career Intelligence -->\n            <div class=\"pathway-arrow-section\">\n                <div class=\"pathway-arrow-line\"></div>\n                <div class=\"pathway-develop-overlay\">\n                    <div class=\"develop-title\">Skills to Develop</div>\n                    <div class=\"develop-items\">\n                        <div class=\"develop-item\">Machine Learning <span class=\"develop-delta\">+2 levels</span></div>\n                        <div class=\"develop-item\">Statistical Modeling <span class=\"develop-delta\">+1 level</span></div>\n                        <div class=\"develop-item\">Python <span class=\"develop-delta\">+1 level</span></div>\n                        <div class=\"develop-item new-skill\">Cloud Basics <span class=\"develop-delta\">new</span></div>\n                    </div>\n                </div>\n                <div class=\"pathway-arrow-line\"></div>\n            </div>\n\n            <!-- Target Role -->\n            <div class=\"pathway-role target-role\">\n                <div class=\"role-header\">\n                    <div class=\"role-badge target\">Target Role</div>\n                    <h3>Data Scientist</h3>\n                </div>\n                <div class=\"role-skills\">\n                    <div class=\"role-skill transfer\"><span class=\"sk-name\">SQL</span><span class=\"sk-level\">Level 4</span></div>\n                    <div class=\"role-skill develop\"><span class=\"sk-name\">Python</span><span class=\"sk-level\">Level 4</span></div>\n                    <div class=\"role-skill new\"><span class=\"sk-name\">Machine Learning</span><span class=\"sk-level\">Level 3</span></div>\n                    <div class=\"role-skill develop\"><span class=\"sk-name\">Statistics</span><span class=\"sk-level\">Level 4</span></div>\n                    <div class=\"role-skill new\"><span class=\"sk-name\">Cloud</span><span class=\"sk-level\">Level 2</span></div>\n                </div>\n            </div>\n        </div>\n\n        <!-- Bottom: Insight Cards — enhanced with Career Intelligence -->\n        <div class=\"pathway-insights\">\n            <div class=\"pathway-insight-card\">\n                <div class=\"insight-icon\" style=\"background: rgba(34, 197, 94, 0.15);\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#22C55E\"><path d=\"M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z\"/></svg>\n                </div>\n                <div class=\"insight-content\">\n                    <h4>Close Proximity</h4>\n                    <p>Skills, tenure, and career trajectory align closely with the target role's core duties &mdash; 4 of 5 skills transfer directly</p>\n                </div>\n            </div>\n            <div class=\"pathway-insight-card\">\n                <div class=\"insight-icon\" style=\"background: rgba(59, 148, 220, 0.15);\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#3B94DC\"><path d=\"M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z\"/></svg>\n                </div>\n                <div class=\"insight-content\">\n                    <h4>Transition Intelligence</h4>\n                    <p>Computed from millions of real career histories &mdash; Data Analyst &rarr; Data Scientist is a high-frequency transition with known development patterns</p>\n                </div>\n            </div>\n            <div class=\"pathway-insight-card\">\n                <div class=\"insight-icon\" style=\"background: rgba(104, 97, 226, 0.15);\">\n                    <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"#6861E2\"><path d=\"M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z\"/></svg>\n                </div>\n                <div class=\"insight-content\">\n                    <h4>Adjacent Opportunities</h4>\n                    <p>Role archetypes reveal 4 other roles within reach: ML Engineer, Analytics Lead, BI Developer, Research Analyst</p>\n                </div>\n            </div>\n        </div>\n\n        <!-- Side callout -->\n        <div class=\"pathway-callout\">\n            Powered by skill proficiency distance, career transition modeling across millions of profiles, and role archetype intelligence\n        </div>\n    </div>\n    <div class=\"speaker-notes\" data-notes=\"8\">\n        <h4>Speaker Notes</h4>\n        Here's where our skills graph and career intelligence combine. Take a Data Analyst who wants to become a Data Scientist. The proficiency model shows that 4 of 5 core skills transfer directly — SQL, Python basics, statistics, visualization. We can quantify exactly how much development each skill needs based on proficiency distance. But now layer in the career intelligence: we've analyzed millions of career histories and know that Data Analyst to Data Scientist is a high-frequency transition with well-established patterns. We can tell you the typical tenure before the move, what skills the successful transitioners had, and what other roles are even closer to this person's current profile. And through our role archetypes, we identify adjacent opportunities — ML Engineer, Analytics Lead — that this person might not have considered but is well-positioned for. This isn't generic career advice. It's personalized pathways built on real data.\n    </div>\n</div>\n", "slides/16-gap-analysis.html": "<!-- Slide 7: Skills Gap Analysis (Crown Jewel) -->\n<div class=\"slide slide-content\" data-slide=\"7\" style=\"justify-content: flex-start;\">\n    <div class=\"slide-header\">\n        <div class=\"slide-number\">07</div>\n        <p style=\"color: var(--
